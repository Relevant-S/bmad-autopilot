# keyword, no `type: object` directive, and no meta-schema validation. The
# top-level shape is `schema_version: "1.0"` + `markers: [<entries>]`. Each
# marker entry is a mapping with `marker_class`, `diagnostic_pointer`, and
# `sub_classifications` (always present, even when empty []).
