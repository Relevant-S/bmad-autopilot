      Phase 1.5 / opt-in 4th-layer review (`bmad-code-review`'s LAD MCP
      path). Emitted when LAD MCP is unavailable or API key is absent during
      code review; loop continues without the 4th adversarial layer.
      Remediation: configure LAD MCP + API key, OR accept the 3-layer review.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: Tier-3-not-configured
    diagnostic_pointer: |
      QA Tier-3 (semantic verification) is not configured for {ac_id}.
      Verification proceeds with Tier-1/Tier-2 evidence only. Remediation:
      configure semantic verification for {ac_id} per `qa-runbook.yaml` at
      `<project-root>/_bmad-output/qa-runbook.yaml`, OR accept the lower-tier
      evidence as sufficient for this AC.
    pointer_context_fields: [ac_id]
    sub_classifications: []

  - marker_class: heuristic-skipped
    diagnostic_pointer: |
      The `heuristic-skipped` class spans two distinct skip families; read the
      marker's `sub_classification` to tell which. NOT a failure — both are
      structural-bound cases.
      (1) Cross-AC exploratory heuristics — the seven `HeuristicKind` values
      (`empty-state` / `error-state` / `auth-boundary` / `rate-limit-boundary` /
      `locale-i18n-edge` / `large-input-boundary` / `permission-boundary`;
      ADR-010 / FR-P2-5, Story 19.2 expanded the Story 4.9 MVP trio): an
      exploratory heuristic does not apply to an AC's input or UI surface. The
      QA Behavioral Plan's `verification_mode` field documents which heuristic
      was skipped. (A heuristic that is `disabled` in the runbook, opted-out
      per-AC, or excluded by the ADR-010 project-type matrix is a SILENT skip —
      it does NOT emit this marker; the marker is for structural inapplicability
      only.)
      (2) Within-AC `flow-branch` (FR22c): emitted as
      `heuristic-skipped: flow-branch-<branch-id>` when an enumerated
      `intentionally-skipped` flow branch (a `flow_branches[]` per-AC entry of
      the QA Behavioral Plan) is skipped; the per-branch one-line
      `skip_rationale` records why. A `flow-branch` skip is NOT an
      exploratory-heuristic skip — the `heuristic-skipped` class is reused
      (rather than introducing a dedicated marker class) to preserve the v1
      27-class closed-set. The operator distinguishes the two families by the
      `sub_classification`, and for `flow-branch` additionally by the
      `<branch-id>` suffix plus the plan's `skip_rationale`.
    pointer_context_fields: []
    sub_classifications:
      - empty-state
      - error-state
      - auth-boundary
      - rate-limit-boundary
      - locale-i18n-edge
      - large-input-boundary
      - permission-boundary
      - flow-branch

  - marker_class: mobile-blocked
    diagnostic_pointer: |
      Mobile QA driving the running mobile app via the mobile MCP (ADR-007 /
      Phase 1.5). Emitted distinctly at init-time (`init-unavailable` — the
      mobile MCP could not be reached when `init_preconditions` probed it on
      a `project_type: mobile` project; total-block init halt per
      `dependencies.yaml`'s `mobile-mcp.by_project_type.mobile.init`
      declaration) and mid-run (`mid-run-unavailable` — the MCP crashed or
      became unreachable during the QA wrapper's AC iteration;
      graceful-degrade skip-the-mobile-QA-phase per
      `dependencies.yaml`'s `mobile-mcp.by_project_type.mobile.runtime`
      declaration). Remediation: at init-time, follow
      `docs/mobile-mcp-setup.md` to install the mobile MCP and connect a
      device; at mid-run, the loop continues to PR-bundle assembly with the
      mobile-QA phase skipped — re-run `/bmad-automation run <story-id>`
      once the device is reconnected.
    pointer_context_fields: []
    sub_classifications:
      - init-unavailable
      - mid-run-unavailable

  - marker_class: env-setup-failed
    diagnostic_pointer: |
      Env provisioning (dev server start, port-binding, Playwright launch)
      failed. QA phase skips with this marker; loop continues to PR-bundle
      assembly. See `sub_classifications` for the specific provisioning step
      that failed. Remediation: inspect the env-setup logs at the qa-evidence
      path.
    pointer_context_fields: []
    sub_classifications:
      - port-bind-failed
      - playwright-launch-failed
      - dev-server-not-ready
      - tea-module-missing
      - bmad-core-version-mismatch
      - claude-code-version-mismatch
      - playwright-mcp-init-unreachable
      - mobile-mcp-init-unreachable

  - marker_class: plan-drift-detected
    diagnostic_pointer: |
      AC hash diverges between Plan creation and current AC text. Plan status
      resets; re-derivation triggers on next QA dispatch. Remediation: review
      the AC change to confirm the new Plan reflects intent; rare false
      positives are acceptable per loud-fail discipline.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: plan-rederivation-drift-detected
    diagnostic_pointer: |
      FR-P2-9 / Story 20.1 — the QA Behavioral Plan re-derived this run from
      the current AC + qa-runbook state differs from the PERSISTED plan at a
      drift surface that AC-hash drift does NOT cover ({drift_surfaces}). This
      is the `reuse-existing` path (AC text — and thus `ac_hash` — unchanged),
      so the mismatch is necessarily beyond AC-hash drift: the per-AC plan
      content (`heuristic_applicability` / `flow_branches` /
      `semantic_verification_tier` — the `semantic_verification_requirement` +
      `expected_evidence_tier` pair) drifted while the AC text held. Independent
      of FR23's `plan-drift-detected` (AC-hash channel) and additive to it —
      this is a read-only cross-check that does NOT overwrite the persisted plan
      (sensor-not-advisor); FR23's `plan_status` reset remains the only trigger
      for plan refresh. Remediation: review whether the qa-runbook / derivation
      state changed intentionally between runs; if so, regenerate the persisted
      plan (e.g. via an AC-text touch that triggers FR23 re-derivation), else
      treat the persisted plan as authoritative. Rare false positives are
      acceptable per loud-fail discipline.
    pointer_context_fields: [drift_surfaces]
    sub_classifications: []

  - marker_class: specialist-timeout
    diagnostic_pointer: |
      Specialist {specialist} exceeded the orchestrator's per-specialist
      timeout budget ({timeout_seconds}s). Envelope is treated as failed;
      remediation targets the specialist's prompt or evidence size. See
      `sub_classifications` for the specific timeout cause (`timeout-exceeded`
      vs. `context-budget-exceeded`).
    pointer_context_fields: [specialist, timeout_seconds]
    sub_classifications:
      - timeout-exceeded
      - context-budget-exceeded

  - marker_class: context-near-limit
    diagnostic_pointer: |
      Specialist {specialist}'s working context is approaching the model's
      context budget. Signals to the orchestrator that retry should be
      `fix-only` rather than `from-scratch`. Remediation options: split
      the AC, reduce input scope; see `docs/architecture.md` §
      Context-budget management. NOT a terminal failure — a degradation
      signal.
    pointer_context_fields: [specialist]
    sub_classifications:
      - dev
      - qa
      - review-bmad

  - marker_class: evidence-truncated
    diagnostic_pointer: |
      QA evidence (screenshot / DOM / HTTP log) exceeded `max_evidence_size_mb`
      and was truncated for the bundle. Remediation: inspect the truncated
      artifact at its on-disk path under
      `_bmad-output/qa-evidence/{story-id}/{run-id}/`.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: hook-failed
    diagnostic_pointer: |
      A hook's exit code is non-zero. Distinct from `bundle-assembly-failed`
      (assembler-logic remediation) and `scope-assertion-violation` (Dev-diff-
      vs-scope remediation): `hook-failed` remediates against the bash
      script's environment. See `sub_classifications` for the canonical
      hook-name suffix (`session-start`, `stop`, `subagent-stop`) emitted
      at runtime per Story 6.7's wiring; the failure-mode suffixes
      (`non-zero-exit`, `timeout`, `missing-binary`) document underlying
      causes a future Phase 2 thickening MAY emit as compound suffixes.
    pointer_context_fields: []
    sub_classifications:
      - missing-binary
      - non-zero-exit
      - session-start
      - stop
      - subagent-stop
      - timeout

  - marker_class: undocumented-section-write
    diagnostic_pointer: |
      A specialist attempted to write to a story-doc section not in the
      documented allowlist (`## Dev Agent Record`,
      `## Senior Developer Review (AI)`, `## Review Findings`,
      `## QA Behavioral Plan`, `## Review Follow-ups (AI)`). Contract-enforced,
      NOT filesystem-permission-enforced. Remediation: route the write to a
      documented section OR amend the allowlist via the upstream-proposal
      workflow.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: orphan-process-cleanup
    diagnostic_pointer: |
      Env teardown discovered a process that should have been cleaned up by
      an earlier teardown. Cleaned up implicitly + visible in the bundle so
      users can investigate root cause. Remediation: review the env-teardown
      logic for the specific provisioning path.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: cost-near-ceiling
    diagnostic_pointer: |
      In-flight cost-telemetry shows a story-run is approaching its cost
      budget (default: 75% of ceiling per Epic 6 specialist boundary cadence).
      Signal to the practitioner before the budget exhausts; loop continues.
      Remediation: monitor or interrupt before exhaustion.
    pointer_context_fields: []
    sub_classifications: [ceiling-crossed]

  - marker_class: smoke-first-abort
    diagnostic_pointer: |
      The QA Behavioral Plan's smoke pass failed before any AC-detail tests
      ran; loop aborts without spending further QA effort on a known-broken
      surface. Distinct from `env-setup-failed` (env up but smoke fails).
      Remediation: fix the smoke-failing surface, then re-run QA.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: dangling-evidence-ref
    diagnostic_pointer: |
      A PR bundle contains an evidence reference path that does not resolve
      to an on-disk artifact. Remediation: regenerate the evidence OR fix the
      reference. Distinct from `orphan-run-state-detected`: dangling-evidence
      is about evidence-file disappearance for a known story; orphan-run-
      state is about run-state for a deleted story-doc.
    pointer_context_fields: []
    sub_classifications: [qa-evidence, retry-history]

  # ---- Cross-epic-named marker classes (12) ---------------------------------
  # Diagnostic_pointer text for these 12 markers is mandated verbatim by AC-2
  # (sourced from the story's "Per-marker diagnostic_pointer map"). The
  # taxonomy-shape test (AC-6) spot-checks key phrases per marker.

  - marker_class: walking-skeleton-bundle
    diagnostic_pointer: |
      Epic 2 thin-signals framing. PR bundles tagged with this marker are
      produced by a substrate that lacks the loud-fail block; emission rule
      is "absent loud-fail block triggers the marker," NOT "Epic 2 era
      triggers the marker" (rule clarified by Epic 6).
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: review-layer-failed
    diagnostic_pointer: |
      Per-layer failure surfaces in `failed_layers` envelope field (FR56) and
      the `decision_needed` finding pattern in Epic 3's Story 3.3. A review
      layer's failure surfaces as both a marker (for tooling) AND a
      `decision_needed: HIGH` finding (for the human reviewer).
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: playwright-mcp-unavailable
    diagnostic_pointer: |
      Playwright MCP runtime unavailable for {project_type} project QA
      dispatch (FR17 + ADR-002 graceful-degrade). Required version range:
      {version_range} per `dependencies.yaml`. Remediation: install Playwright
      MCP at the declared version range, OR mark this story for later runs
      once MCP is available.
    pointer_context_fields: [project_type, version_range]
    sub_classifications: []

  - marker_class: scope-assertion-violation
    diagnostic_pointer: |
      FR10 (fix-only constraint) + FR12 (verification logic) + FR58
      (SubagentStop hook non-zero exit path). Domain-specific contract
      violation distinct from `hook-failed` because remediation differs
      (review Dev's diff vs. declared scope; possibly tighten retry's
      `affected_files`); markers are remediation-shaped, not emission-point-
      shaped.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: retry-budget-exhausted
    diagnostic_pointer: |
      FR8 (budget) + FR14 (non-advance + state preservation) + FR15
      (escalation bundle assembly path). Normal-flow halt event, NOT a
      failure of any single specialist.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: bundle-assembly-failed
    diagnostic_pointer: |
      FR59 (Stop hook bundle assembly) + Epic 6. Distinct from `hook-failed`
      per the remediation-shape principle: `hook-failed` remediates against
      the Stop hook script (bash, environment); `bundle-assembly-failed`
      remediates against the assembler logic (envelope shape, finding
      rendering, taxonomy mismatch). Practitioner needs to know which surface
      to inspect. Step: `{failed_step}`. Story: `{story_id}`. Run: `{run_id}`.
      Exception: `{exception_type}`. See
      `_bmad-output/pr-bundles/{story_id}/{run_id}.assembly-failure.log` for
      full traceback. Distinct from `hook-failed: stop` per remediation-shape:
      hook-failed remediates the Stop hook script (bash, environment,
      invocation contract); bundle-assembly-failed remediates the assembler
      logic (rendering, schema, taxonomy).
    pointer_context_fields: [exception_type, failed_step, run_id, story_id]
    sub_classifications:
      - envelope-mismatch
      - finding-render-crash
      - internal-exception
      - missing-finding-fields
      - taxonomy-unresolved

  - marker_class: reconciler-mismatch-runtime
    diagnostic_pointer: |
      FR33 (runtime variant) + Epic 6's runtime gate. Runtime reconciliation
      failed: reference-project run produced skip-event class
      `{skip_event_class}` at code surface `{code_surface}` but no
      emitted marker reconciled. Inspect specialist or hook at
      `{code_surface}` for missing emission. See `docs/architecture.md`
      § Runtime gate input contract for the input-capture mechanism.
      Distinct from fixture-driven gate failures (Story 1.8): runtime
      mismatch indicates a reference-project run produced a skip-event
      the marker emission missed; remediation targets the specialist or
      hook that missed the event, not the harness/synthetic fixture.
    pointer_context_fields: [code_surface, skip_event_class]
    sub_classifications: []

  - marker_class: cost-telemetry-unavailable
    diagnostic_pointer: |
      ADR-006 (OTel cost-event pipeline) + NFR-P5 (per-retry cost
      observability). Graceful-degrade behavior when OTel pipeline fails:
      cost data unavailable for the run; loop continues; bundle's
      cost-breakdown section shows the marker rather than fabricated zeros.
    pointer_context_fields: []
    sub_classifications:
      - otel-pipeline-unreachable
      - prompt-id-correlation-missing

  - marker_class: story-doc-version-out-of-window
    diagnostic_pointer: |
      FR43 (N-2 minor-version tolerance window) + NFR-I5 (story-doc version
      tolerance behavior). An out-of-window story-doc template version
      surfaces this marker plus upgrade guidance, rather than failing hard.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: init-would-destroy-existing-artifact
    diagnostic_pointer: |
      FR41 (non-destructive on existing projects) + FR42 (re-runs preserve
      customization). `init` halts with this marker when proceeding would
      overwrite user-owned content. Remediation requires the practitioner to
      inspect what would be overwritten and choose to back up, merge, or
      accept overwrite explicitly. Distinct from `env-setup-failed` (env
      present but broken) and from `story-doc-version-out-of-window`
      (artifact present but wrong version).
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: recovery-state-conflict
    diagnostic_pointer: |
      NFR-R2 (crash recovery) + NFR-R8 (cross-state consistency: story-doc
      canonical, run-state cache) + Epic 8's SessionStart reattachment. Fires
      when run-state and story-doc disagree and the recovery algorithm
      cannot reconcile cleanly. Remediation requires human triage of which
      state representation reflects reality, then explicit reconciliation.
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: orphan-run-state-detected
    diagnostic_pointer: |
      FR48b (multi-story status enumeration). Fires when the status
      enumerator finds run-state entries for stories whose story-doc has
      been deleted, renamed, or moved. Remediation is purge orphan run-state
      OR recover the missing story-doc. Distinct from `recovery-state-
      conflict` (state inconsistency for a *known* story) and from
      `dangling-evidence-ref` (story-doc is the canonical anchor, not
      evidence in the FR49 sense — conflating semantics is forbidden).
    pointer_context_fields: []
    sub_classifications: []

  # ---- Story 2.3 branch-lifecycle write-time guards (2) ---------------------

  - marker_class: git-uncommitted-work-detected
    diagnostic_pointer: |
      NFR-R3 (PRD line 947, git operation safety — "Git operations that would
      destroy uncommitted user work halt with a diagnostic rather than
      proceeding") + NFR-S3 (PRD line 971, git operation scope) + NFR-O5
      (PRD line 984, named diagnostic per failure class) + `docs/git-hygiene.md`
      § "No operations that destroy uncommitted user work". Fires at write-time
      (pre-branch-creation) when the per-story branch lifecycle module
      (Story 2.3's `branch_lifecycle.create_story_branch`) detects uncommitted
      changes via the injected `WorkingTreeProbe` callable. The orchestrator
      halts; it does NOT auto-stash, auto-commit, or auto-clean — the
      practitioner decides remediation (stash, commit, or abort). Distinct
      from `dangling-uncommitted-work` (entry 14), which is ADR-005's git
      probe diagnostic firing at recovery-time on commit-state mismatch
      (visibility-only, not flow-blocking); this marker is a write-time halt
      diagnostic (flow-blocking pre-write).
    pointer_context_fields: []
    sub_classifications: []

  - marker_class: trunk-branch-write-rejected
    diagnostic_pointer: |
      NFR-S3 (PRD line 971, git operation scope — verbatim "No operations on
      `main` / `master` / `trunk`") + Story 2.3's `branch_lifecycle` module +
      `docs/git-hygiene.md` § "No operations on `main` / `master` / `trunk`".
      Fires when the trunk-name allowlist consultation in
      `branch_lifecycle.create_story_branch` matches the would-be branch name
      against an entry in the configurable allowlist (default
      `("main", "master", "trunk")` per NFR-S3's enumeration; overridable via
      `_bmad/automation/config.yaml` per FR40). Rejection happens at module
      level BEFORE any `git checkout`-form invocation; no git command runs
      against the protected branch. Remediation: review the project's actual
      trunk branch name and the orchestrator's `trunk_allowlist` configuration.
    pointer_context_fields: []
    sub_classifications: []

  # ---- Story 14.3 — Epic 14 worktree-isolation substrate ---------------------

  - marker_class: worktree-stale-lock
    diagnostic_pointer: |
      Epic 14 / Story 14.3 — Per-story worktree filesystem-lock at
      `_bmad/automation/locks/{story_id}.lock` (PID + ISO 8601 timestamp +
      worktree-path) detected as stale (holding PID no longer alive OR
      record age exceeded stale_threshold_seconds; default 3600s). Surfaces
      via SessionStart hook on resume after a crashed worktree lifecycle.
      Distinct from `orphan-process-cleanup` (process-teardown leakage) and
      `orphan-run-state-detected` (run-state for a deleted story-doc) per
      the categorical axis "filesystem-coordination-primitive remnant" vs
      "process-leakage" vs "story-doc-orphan run-state". Remediation:
      operator inspects `_bmad/automation/locks/{story_id}.lock`, confirms
      the holding PID is gone, then either invokes the future
      `/bmad-automation cleanup {story_id}` command (ADR-009 forward-pointer)
      OR deletes the lock file manually with `rm`. The substrate does NOT
      auto-clear stale locks at SessionStart — operator-decided remediation
      mirrors the no-auto-`--force` posture of Story 14.2's worktree
      cleanup (NFR-R3 + Pattern 5 loud-fail doctrine).
    pointer_context_fields: [story_id]
    # Story 15.1 (AC-6): `worktree-stale-lock` is a TRANSIENT condition-marker —
    # a derived view of live filesystem-lock state recomputed each cycle by
    # `evaluate_reattach`, NOT durable history. The Epic 15 epic-run-state
    # write-back filter (`advance_epic_run_state`) consults this `lifetime`
    # field at runtime and excludes every `transient`-lifetime marker before
    # the atomic rename, so a persisted run-state can never make this marker
    # go sticky (NFR-R2). Every other entry omits `lifetime` and inherits the
    # `durable` default — durable markers are never stripped (Story 1.4
    # marker-permanence rule).
    lifetime: transient
    sub_classifications:
      - pid-not-alive
      - age-exceeded
      - corrupted-lock-file

  # ---- Story 14.5 — Epic 14 parallel-mode cross-state pollution pre-provision -

  - marker_class: parallel-story-state-pollution
    diagnostic_pointer: |
      Epic 14 / Story 14.5 (pre-provision) — Two or more per-story worktrees
      running concurrently under Phase 2 parallel mode (Epic 18 / FR-P2-4,
      `parallel_stories: true`) wrote conflicting state to a SHARED-state
      surface. Detection-time: parallel-dispatch RUNTIME (Epic 18 altitude —
      NOT init-time, NOT SessionStart). Severity: loud-fail /
      practitioner-blocking — the substrate does NOT auto-resolve the
      collision; visibility-over-enforcement per Pattern 5 + NFR-R8's
      story-doc-canonical recovery posture; the practitioner inspects the
      conflicting surface and decides remediation. Shared-state surfaces
      (architecture.md ADR-005 Phase-2 extension, Story 14.5): (1) shared
      port pool used by concurrent env provisioning (FR7 / Epic 18 Story
      18.3); (2) shared evidence root (concurrent writes to the same
      evidence subpath); (3) epic/sprint aggregate run-state (two worktrees
      claiming the same story-id, or interleaved non-atomic writes to the
      aggregate run-state landed by Story 14.4). Per-surface conflict
      detection is specified at the contract level in ADR-005's Phase-2
      sub-section; the DETECTION WIRING is Epic 18 Story 18.2's
      responsibility — this story pre-provisions the marker + invariant only.
      Distinct from `worktree-stale-lock` (single-story filesystem-lock
      remnant from ONE crashed worktree, Story 14.3),
      `recovery-state-conflict` (single-run multi-store recovery
      disagreement, Story 8.2), and `orphan-run-state-detected` (run-state
      for a deleted story-doc). Conflict context: story `{story_id}`
      collided with `{conflicting_story_id}` on shared surface
      `{shared_surface}`. Remediation: practitioner inspects the named
      surface, resolves the collision (e.g., reassign port, separate
      evidence subpath, reconcile aggregate run-state), then re-dispatches.
    pointer_context_fields: [story_id, conflicting_story_id, shared_surface]
    sub_classifications:
      - shared-port-collision
      - shared-evidence-root-collision
      - aggregate-run-state-cross-write

  - marker_class: epic-budget-exhausted
    diagnostic_pointer: |
      FR-P2-1 / Epic 15 Story 15.2 — the cumulative per-epic retry budget
      (`per_epic_retry_budget_multiplier × story_count`, separate from and
      additive on top of the per-story `retry_budget`) was exhausted while
      undispatched stories remained. The epic paused at the next story-
      completion boundary (`epic-paused-on-budget`); the in-flight story was
      allowed to FINISH (sensor-not-advisor — the Orchestrator never interrupts
      an in-flight story). Normal-flow cost-bounding halt, NOT a failure of any
      single specialist. Distinct from `retry-budget-exhausted` (per-story
      budget, one story's loop) and `epic-paused-on-escalation` (a quality
      issue — a contained story escalated; escalation takes `current_state`
      precedence while this marker still emits additively). Exhaustion exactly
      on the final story is NOT a pause (the epic completes). Budget overage for
      epic `{epic_id}` (run `{run_id}`): consumed `{consumed}` of
      `{effective_budget}`. Remediation (the human decides): raise
      `per_epic_retry_budget_multiplier` in `_bmad/automation/config.yaml`, or
      split the epic, then re-dispatch the undispatched stories; inspect the
      running epic-level PR bundle (Story 15.3) for the per-story retry
      breakdown.
    pointer_context_fields: [epic_id, run_id, consumed, effective_budget]
    sub_classifications: []

  - marker_class: sprint-escalation-rate-exceeded
    diagnostic_pointer: |
      FR-P2-2 / Epic 16 Story 16.2 — the cumulative sprint escalation rate
      (`escalated_stories / stories_completed`) exceeded the configured
      `sprint_escalation_rate_threshold` (default 0.25, calibrated from the PRD's
      15–25% retry-budget-exhaustion target band). INFORMATIONAL, not blocking
      (sensor-not-advisor): the sprint CONTINUES dispatching and the marker does
      NOT change `current_state` — it surfaces systemic escalation as a quality-
      axis signal so the practitioner can decide whether to pause the sprint
      manually. Distinct from `sprint-paused-on-budget` (the cost-axis surface: a
      cumulative per-sprint retry-budget pause — different remediation) and from
      `epic-paused-on-escalation` (a single contained epic's escalation, one scope
      down). Sprint `{sprint_id}` (run `{run_id}`): `{escalated_stories}` of
      `{stories_completed}` completed stories escalated, above threshold
      `{threshold}`. Remediation (the human decides): inspect the escalated
      stories' per-story escalation bundles for a systemic root cause (recurring
      AC ambiguity, environmental flakiness, an under-specified epic), then
      decide whether to pause the sprint; tune `sprint_escalation_rate_threshold`
      in `_bmad/automation/config.yaml` if the default does not fit this sprint's
      risk profile.
    pointer_context_fields: [sprint_id, run_id, escalated_stories, stories_completed, threshold]
    sub_classifications: []

  # ---- Story 24.1 — Epic 24 parallel-dispatch admission/seed infra loud-fail --

  - marker_class: parallel-dispatch-infra-failed
    diagnostic_pointer: |
      FR-P2-4 / Epic 24 Story 24.1 — an infrastructure exception in the parallel
      dispatcher's admission arm (`claim_provider`, port/claim acquisition before
      a unit is admitted) or seed arm (`seed_carrier` → `pre_seed_parallel_env`,
      the deferred per-worktree carrier write) was caught and routed through
      fold-then-surface: every already-completed in-flight story terminal was
      folded into `epic-run-state.yaml` FIRST (status + per-epic retry-budget
      `consumed` + per-epic cost partition), THEN the epic paused on
      `epic-paused-on-escalation` with this durable marker. Detection-time:
      parallel-dispatch RUNTIME (Epic 18/24 altitude — NOT init-time, NOT
      SessionStart). Severity: loud-fail / practitioner-blocking — the substrate
      does NOT auto-resolve, retry, or interrupt any in-flight story
      (sensor-not-advisor); it surfaces so the practitioner inspects the failing
      arm and decides remediation. The fold-BEFORE-surface ordering exists so a
      `claim_provider`/`seed_carrier` failure can never silently destroy
      completed work via `ThreadPoolExecutor` shutdown-drop, and so Epic 17's
      auto-merge gate — which reads exactly these folded budget + marker
      terminals — never makes a merge decision against a state that lost a
      completed fold with no surfaced marker. Distinct from
      `parallel-story-state-pollution` (cross-story shared-surface write
      collision between two concurrent worktrees — a conflict, not an infra
      exception) and from `worktree-stale-lock` (single-story filesystem-lock
      remnant from one crashed worktree). Scoped to the two named arms only via a
      typed exception boundary: every OTHER worker exception (`create_worktree` /
      `story_file_lock` / the per-story `runner`) keeps the accepted
      loud-fail-by-exception path and re-raises after its batch siblings fold.
      Infra failure for story `{story_id}` (epic `{epic_id}`, run `{run_id}`) on
      arm `{failing_arm}`. Remediation (the human decides): inspect the named arm
      (a stuck/mis-stubbed allocator for `claim-provider-failed`; an `OSError`
      from the carrier write for `seed-carrier-failed`), resolve the underlying
      infrastructure fault, then re-dispatch the undispatched stories — the
      completed siblings already folded into the epic aggregate are preserved.
    pointer_context_fields: [epic_id, run_id, story_id, failing_arm]
    sub_classifications:
      - claim-provider-failed
      - seed-carrier-failed

  # ---- Story 19.3 — Epic 19 a11y-audit evidence markers (FR-P2-6, ADR-011) ---

  - marker_class: a11y-baseline-stale
    diagnostic_pointer: |
      FR-P2-6 / Epic 19 Story 19.3 (ADR-011) — informational a11y-baseline
      signal for AC `{ac_id}`: the accessibility audit either created a NEW
      baseline (no prior baseline existed for this AC's audited surface) or is
      treating an existing stored baseline as the comparison anchor for the
      self-computed violation delta. NOT a failure (sensor-not-advisor): the
      audit proceeds; the marker records that this run's delta is measured
      against a freshly-anchored baseline, so a downstream `a11y-delta-exceeded`
      on the SAME run is measuring against this new anchor, not a historical
      one. The a11y audit runs in-page via the existing Playwright MCP browser
      surface (axe-core `axe.min.js` injection; NO new MCP server) and is
      opt-in-skip / web-only — silent unless `qa-runbook.a11y.enabled: true`.
      Runtime emission + the baseline-storage location land in Story 19.4 (this
      story enumerates the class only — flip-the-switch property). Remediation
      (the human decides): none required for a genuinely new baseline; if the
      anchor is unexpectedly new, confirm the prior baseline artifact was not
      lost or relocated before trusting this run's delta.
    pointer_context_fields: [ac_id]
    sub_classifications: []

  - marker_class: a11y-delta-exceeded
    diagnostic_pointer: |
      FR-P2-6 / Epic 19 Story 19.3 (ADR-011) — the self-computed accessibility
      violation delta for AC `{ac_id}` (set-difference on axe-core
      `violations[]` keys between the stored baseline and this run) exceeded the
      configurable a11y delta threshold. axe-core ships no native baseline-delta
      — the Automator computes the delta over axe-core's deterministic
      `violations[]` JSON — so this marker reports a regression the Automator
      measured, not an axe-core verdict. Detection-time: web QA RUNTIME (the
      a11y audit runs in-page via the existing Playwright MCP browser surface;
      axe-core `axe.min.js` injection, NO new MCP server). Severity: loud-fail /
      practitioner-blocking surfaced as evidence — the substrate does NOT
      auto-resolve or fail the AC (sensor-not-advisor); it surfaces so the human
      inspects the new violations. opt-in-skip / web-only — silent unless
      `qa-runbook.a11y.enabled: true`. The delta evidence artifact + threshold
      config surface land in Story 19.4 (this story enumerates the class only —
      flip-the-switch property). Remediation (the human decides): open the delta
      evidence artifact, triage the newly-introduced violations against the
      baseline, then fix the regression or re-anchor the baseline intentionally.
    pointer_context_fields: [ac_id]
    sub_classifications: []

  - marker_class: a11y-delta-mode-unstable
    diagnostic_pointer: |
      FR-P2-6 / Epic 19 Story 19.3 (ADR-011) — FALLBACK: the self-computed
      accessibility baseline-delta could not be produced reliably (the
      Automator-side set-difference over axe-core's `violations[]` JSON proved
      non-deterministic for this run), so the a11y audit shipped FULL-REPORT
      mode (no delta) rather than a possibly-wrong regression verdict. NOT a
      failure of the audit itself (sensor-not-advisor): the full axe-core
      violation report is still captured as evidence; only the delta layer is
      withheld. This is the loud-fail escape valve named in ADR-011 — the delta
      is the Automator's to compute, not axe-core's, so the unstable-delta
      condition is surfaced rather than silently swallowing a bad diff.
      Detection-time: web QA RUNTIME (axe-core `axe.min.js` injected in-page via
      the existing Playwright MCP browser surface; NO new MCP server).
      opt-in-skip / web-only — silent unless `qa-runbook.a11y.enabled: true`.
      Runtime emission + the full-report-no-delta path land in Story 19.4 (this
      story enumerates the class only — flip-the-switch property). Remediation
      (the human decides): read the full a11y report directly; if the unstable
      delta recurs across Phase-2 reference runs, ADR-011's revisit condition
      fires (make full-report the default).
    pointer_context_fields: []
    sub_classifications: []

  # ---- Story 19.5 — Epic 19 visual-regression evidence markers (FR-P2-10, ADR-012) ---

  - marker_class: visual-regression-delta-exceeded
    diagnostic_pointer: |
      FR-P2-10 / Epic 19 Story 19.5 (ADR-012) — the self-computed visual delta
      (the mismatched-pixel ratio from pixelmatch) for AC `{ac_id}` exceeded the
      configurable visual delta threshold
      (`qa-runbook.visual_regression.delta_threshold`). pixelmatch ships NO
      baseline lifecycle — the Automator computes the mismatched-pixel ratio
      (`mismatched_pixels / total_pixels`) over the deterministic count — so this
      marker reports a regression the Automator measured, not a pixelmatch
      verdict. The dimension-mismatch edge folds here: a changed render size
      (baseline vs current dimensions differ, so pixelmatch cannot run over
      unequal dimensions) IS a visual regression, recorded with the dimension
      change in the diff artifact. Detection-time: web-AND-mobile QA RUNTIME —
      screenshots captured via the EXISTING Playwright MCP `browser_take_screenshot`
      (web) / mobile-mcp `mobile_take_screenshot` (mobile) surfaces; the
      pixelmatch diff runs over the two saved PNGs; NO new MCP server. Severity:
      loud-fail / practitioner-blocking surfaced as evidence — the substrate does
      NOT auto-resolve or fail the AC (sensor-not-advisor); it surfaces so the
      human triages the changed region. opt-in-skip / web-AND-mobile (api does
      NOT invoke — no UI to capture) — silent unless
      `qa-runbook.visual_regression.enabled: true`. Remediation (the human
      decides): open the diff evidence artifact (the diff PNG + the
      ratio/counts/dimensions), triage the changed region, then fix the
      regression or re-anchor the baseline intentionally.
    pointer_context_fields: [ac_id]
    sub_classifications: []

  - marker_class: visual-regression-baseline-missing
    diagnostic_pointer: |
      FR-P2-10 / Epic 19 Story 19.5 (ADR-012) — informational visual-regression
      signal for AC `{ac_id}`: no stored baseline existed for this AC's captured
      surface, so the audit created a NEW baseline from this run's screenshot and
      has nothing to compare against yet. NOT a failure (sensor-not-advisor): the
      audit proceeds; the marker records that this run anchored a fresh baseline.
      Distinct from `visual-regression-delta-exceeded` — different remediation
      (regenerate/confirm vs. investigate-change). Covers BOTH a genuine first
      run AND a subsequent run whose baseline was deleted/relocated (the substrate
      cannot distinguish them — the operator reads the marker and decides whether
      the fresh anchor is expected). Detection-time: web-AND-mobile QA RUNTIME
      (screenshots captured via the EXISTING Playwright MCP `browser_take_screenshot`
      / mobile-mcp `mobile_take_screenshot` surfaces; NO new MCP server).
      opt-in-skip / web-AND-mobile (api does NOT invoke) — silent unless
      `qa-runbook.visual_regression.enabled: true`. Remediation (the human
      decides): none required for a genuinely new baseline; if the anchor is
      unexpectedly new, confirm the prior baseline artifact was not lost or
      relocated before trusting subsequent deltas.
    pointer_context_fields: [ac_id]
    sub_classifications: []
