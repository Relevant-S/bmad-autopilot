# Specialist envelope schema (substrate component 1).
#
# Contract anchors:
#   - ADR-003 (Schema Enforcement and Loud-Fail Harness Reconciliation, substrate component 1)
#   - FR51 (uniform envelope across specialists)
#   - FR52 (sensor-not-advisor — forbidden flow-policy fields, e.g. next_action / recommendation)
#   - FR53 (CI gate rejects envelopes carrying forbidden fields)
#   - FR54 (Dev-specific extensions: proposed_commit_message, scope_expanded_to)
#   - FR55 (QA-specific extensions: ac_results, plan_drift)
#   - FR56 (Review-BMAD-specific extensions: failed_layers)
#   - FR23 (Story 4.2: AC-hash plan-drift detection — optional `plan_drift`
#     diagnostic-context carrier surfaced when QA's `surface_plan_drift`
#     consumes Story 4.1's `drift-suspected` action token; per-convention
#     audit-trail row in `docs/extension-audit.md`)
#   - FR19 (Story 4.7: AC-assertion-evidence triple structural enforcement —
#     passing AC results require ≥ 1 entry in `assertions` AND
#     `evidence_refs` arrays via if/then conditional in $defs/ac_result;
#     failing/blocked AC results are unconstrained per epics.md lines
#     2009-2012)
#   - FR20 / FR21 (Story 4.8: three-tier evidence hierarchy structurally
#     enforced — evidence_refs items are {path, tier} objects with tier ∈
#     {tier-1-mechanical, tier-2-outcome, tier-3-semantic}; semantic_verification
#     tightens to closed enum {verified, not_configured, not_applicable})
#   - FR22 (Story 4.9: three exploratory heuristics — empty-state /
#     error-state / auth-boundary — with `verification_mode: exploratory-heuristic`
#     discriminator field added to $defs/finding; sibling of the `meta` field
#     precedent from Story 3.3, single-responsibility per discriminator)
#   - ADR-008 (Story 10.3: LAD MCP server selection — `Shelpuk-AI-Technology-Consulting/lad_mcp_server`,
#     version_floor `bb47e9e`; Phase-1.5 activation of Review-LAD as the 4th
#     specialist envelope source — uniform FR51 four-field shape, findings
#     carry `source: "lad"` per the Phase-1-reserved `$defs/finding.source`
#     enum; ZERO top-level shape extension at this story — LAD-specific
#     extensions are deferred to Story 10.4 IF THEY EMERGE per Epic 10
#     (Review-LAD as Opt-In 4th Parallel Reviewer) +
#     `_bmad-output/planning-artifacts/epics-phase-1.5.md` lines 257-270)
#   - Pattern 1 (snake_case fields; identifier values follow PRD-canonical literals)
#
# This file encodes a contract validated by CI; modify with care.
# Closed-by-default: additionalProperties=false at top-level rejects every
# undeclared field. The explicit `not` clause names the two known forbidden
# flow-policy fields so the validator's UX surface (envelope_validator.format_errors)
# can rewrite errors to "forbidden flow-policy field: <name>" per AC-2.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://bmad-autopilot.local/schemas/envelope.schema.yaml"
title: "Specialist Envelope"
description: >-
  Uniform return envelope every BMAD specialist (Dev, Review-BMAD, QA, Review-LAD)
  emits. The orchestrator parses this shape; flow-policy decisions are the
  orchestrator's job, never the specialist's (sensor-not-advisor invariant).
  Review-LAD is the Phase-1.5-activated opt-in 4th specialist (Epic 10 +
  ADR-008 + Story 10.2's `agents/review-lad-wrapper.md` scaffold); its
  findings carry `source: "lad"` per the `$defs/finding.source` enum.

type: object
required:
  - status
  - artifacts
  - findings
  - rationale
additionalProperties: false

# Defense-in-depth against the two most plausible flow-policy fields.
# additionalProperties: false would already reject these, but naming them
# explicitly lets the validator emit a clear "forbidden flow-policy field"
# message instead of the generic "additional property not allowed".
not:
  anyOf:
    - required: [next_action]
    - required: [recommendation]

properties:
  status:
    type: string
    enum: [pass, fail, blocked]
    description: "PRD-canonical lifecycle outcome literal."

  artifacts:
    type: array
    description: "Repo-relative file paths the specialist produced or modified."
    items:
      type: string
      minLength: 1

  findings:
    type: array
    description: "Structured findings; each is a sensor observation, never a flow directive."
    items:
      $ref: "#/$defs/finding"

  rationale:
    type: string
    minLength: 1
    description: "Non-empty narrative explaining the envelope's status."

  # ---- Optional specialist extensions (closed allowlist) -------------------
  # Per AC-1: specialist-specific extensions are permitted under their respective
  # specialist sub-schemas. Resolved here as a flat top-level allowlist (see Dev
  # Notes "Open design choice" — no discriminator field exists in the PRD shape).
  # The schema's job is shape; meaning (e.g. "ac_results is meaningful only for
  # QA envelopes") is consumer-side.

  proposed_commit_message:
    type: string
    description: "Dev-specific (FR54). Suggested commit message for the implemented change."

  scope_expanded_to:
    type: array
    description: "Dev-specific (FR54). File paths the Dev specialist's scope expanded to."
    items:
      type: string
      minLength: 1

  ac_results:
    type: array
    description: "QA-specific (FR55). Per-acceptance-criterion verification results."
    items:
      $ref: "#/$defs/ac_result"

  failed_layers:
    type: array
    description: "Review-BMAD-specific (FR56). Review layers whose execution failed."
    items:
      type: string
      enum: [blind, edge, auditor, lad]

  plan_drift:
    # QA-specific (FR23 + Story 4.2). Diagnostic context surfaced when QA's
    # `surface_plan_drift` consumes Story 4.1's `drift-suspected` action token
    # AND emits the `plan-drift-detected` marker. Optional non-null shape: the
    # field is absent on no-drift runs (write-new / reuse-existing branches);
    # present-and-object-conforming-to-$defs/plan_drift on drift runs. The
    # field is consumed by the bundle assembler's QA-section render to
    # surface the four-field diagnostic + the structured marker comment.
    # Recorded in `docs/extension-audit.md` per the no-introductions principle.
    $ref: "#/$defs/plan_drift"

  heuristic_skipped_emissions:
    type: array
    description: "QA-specific (FR22 + Story 4.9). Per-heuristic-skipped emission records carried on the QA envelope. Optional non-null shape: the field is absent on stories where every heuristic applies (no skips); present-and-array-conforming-to-$defs/heuristic_skipped_emission on stories with ≥ 1 structurally inapplicable heuristic. The field is consumed by the bundle assembler's QA-section render to surface the per-emission diagnostic prose + the structured marker comment co-located. Recorded in `docs/extension-audit.md` per the no-introductions principle."
    items:
      $ref: "#/$defs/heuristic_skipped_emission"

$defs:
  finding:
    type: object
    required:
      - id
      - source
      - title
      - detail
      - location
      - bucket
      - severity
    additionalProperties: false
    properties:
      id:
        type: string
        minLength: 1
      source:
        type: string
        enum: [blind, edge, auditor, qa, lad, merged]
      title:
        type: string
        minLength: 1
      detail:
        type: string
        minLength: 1
      location:
        # "file:line" or "" for non-file-anchored findings.
        type: string
      bucket:
        type: string
        enum: [decision_needed, patch, defer, dismiss]
      severity:
        type: string
        enum: [HIGH, MED, LOW]
      # Optional QA-only flag (PRD line 587). Documented as optional; not enforced
      # via discriminator at this story (no specialist field exists in the contract).
      retry_likely_to_resolve:
        type: boolean
      # Optional Review-BMAD wrapper-layer-only discriminator (Story 3.3 + FR28 + FR56).
      # Distinguishes synthetic meta-findings emitted by `surface_failed_layers`
      # (the three-channel atomic emission for per-layer failure) from layer-produced
      # content findings. The enum is intentionally narrow at this story; the Story 4.9
      # `verification_mode` field below at $defs/finding.properties.verification_mode IS
      # the second-instance discriminator-field precedent that motivates this comment's
      # forward-looking framing; further wrapper-layer-only discriminator FIELDS
      # (parallel to `meta` and `verification_mode`) are added as siblings, NOT as enum
      # extensions of EITHER existing field — single-responsibility per discriminator
      # field. Closed-by-default invariant ($defs/finding.additionalProperties: false
      # above) is preserved.
      meta:
        type: string
        enum: [review-completeness]
      # Optional QA wrapper-layer-only discriminator (Story 4.9 + FR22).
      # Distinguishes synthetic exploratory-heuristic findings (surfaced by the
      # three MVP heuristics: empty-state, error-state, auth-boundary) from
      # AC-driven findings (the wrapper's per-AC `verify_ac` output). Mirrors
      # the `meta` field precedent at line 169. Closed-by-default invariant
      # ($defs/finding.additionalProperties: false above) is preserved.
      verification_mode:
        type: string
        enum: [exploratory-heuristic]
        description: "QA wrapper-layer-only discriminator (Story 4.9 + FR22). Distinguishes synthetic exploratory-heuristic findings (surfaced by the three MVP heuristics: empty-state, error-state, auth-boundary) from AC-driven findings (the wrapper's per-AC `verify_ac` output). Mirrors the `meta` field precedent at line 169. Closed-by-default invariant ($defs/finding.additionalProperties: false above) is preserved."

  ac_result:
    type: object
    required:
      - ac_id
      - status
      - assertions
      - evidence_refs
      - semantic_verification
    additionalProperties: false
    # FR19 (Story 4.7): the AC-assertion-evidence triple is structurally
    # enforced — passing AC results require ≥ 1 entry in `assertions` AND
    # `evidence_refs`. Failing / blocked AC results are unconstrained per
    # epics.md lines 2009-2012 (failures may have partial evidence, which
    # is fine for diagnostic purposes). The `required: [status]` inside
    # the `if` clause is the JSON-Schema idiom for "this conditional
    # applies WHEN the property is present" so an `ac_result` lacking
    # `status` does not vacuously match `if` and trigger `then`.
    allOf:
      - if:
          properties:
            status:
              const: pass
          required: [status]
        then:
          properties:
            assertions:
              minItems: 1
            evidence_refs:
              minItems: 1
    properties:
      ac_id:
        type: string
        minLength: 1
      status:
        type: string
        enum: [pass, fail, blocked]
      assertions:
        type: array
        items:
          type: string
      evidence_refs:
        type: array
        items:
          $ref: "#/$defs/evidence_ref"
      semantic_verification:
        # FR21 (Story 4.8). Closed string enum mirroring PRD line 596 byte-for-
        # byte. The result-side field captures what HAPPENED at semantic-
        # verification time per AC: `verified` (Tier-3 ran and passed),
        # `not_configured` (plan declared Tier-3 required but tooling isn't
        # set up — emitted alongside the `Tier-3-not-configured` marker),
        # `not_applicable` (plan declared Tier-3 N/A, OR plan declared Tier-3
        # optional and tooling isn't configured). The PLAN-side
        # `semantic_verification_requirement` field (qa_behavioral_plan.py)
        # carries `required | optional | not_applicable` — distinct value
        # space, distinct field; "required" is INTENTIONALLY rejected here.
        type: string
        enum: [verified, not_configured, not_applicable]

  evidence_ref:
    # FR20 / FR21 (Story 4.8): three-tier evidence hierarchy structurally
    # enforced. Each evidence ref carries a tier ∈ {tier-1-mechanical,
    # tier-2-outcome, tier-3-semantic} per the verbatim epic AC at
    # epics.md line 2029. The tier enum mirrors qa_behavioral_plan.py's
    # `ExpectedEvidenceTier` Literal byte-for-byte.
    type: object
    required:
      - path
      - tier
    additionalProperties: false
    properties:
      path:
        type: string
        minLength: 1
      tier:
        type: string
        enum: [tier-1-mechanical, tier-2-outcome, tier-3-semantic]

  plan_drift:
    # QA-specific (FR23 + Story 4.2) diagnostic context carried on the
    # envelope when QA's `surface_plan_drift` detects an AC-hash drift and
    # emits the `plan-drift-detected` marker. The four required fields
    # mirror the verbatim epic AC at `_bmad-output/planning-artifacts/epics.md`
    # line 1851 (`story_id`, `prior_plan_status`, `prior_ac_hash`,
    # `current_ac_hash`). The `prior_plan_status` enum mirrors Story 4.1's
    # `PlanStatus` Literal at `qa_behavioral_plan.py` line 170. The
    # `*_ac_hash` patterns mirror Story 4.1's 64-char SHA-256 hex digest
    # contract from `docs/architecture.md` line 1591.
    type: object
    required:
      - story_id
      - prior_plan_status
      - prior_ac_hash
      - current_ac_hash
    additionalProperties: false
    properties:
      story_id:
        type: string
        minLength: 1
      prior_plan_status:
        type: string
        enum: [generated, human-reviewed]
      prior_ac_hash:
        type: string
        pattern: "^[0-9a-f]{64}$"
      current_ac_hash:
        type: string
        pattern: "^[0-9a-f]{64}$"

  heuristic_skipped_emission:
    # QA-specific (FR22 + Story 4.9) per-heuristic-skipped emission record.
    # Mirrors `qa_exploratory_heuristics.HeuristicSkippedEmissionRecord`
    # Pydantic model byte-for-byte. The `sub_classification` enum mirrors
    # the bumped marker-taxonomy.yaml `heuristic-skipped.sub_classifications`
    # at AC-5 byte-for-byte AND `qa_behavioral_plan.HeuristicApplicability`
    # at line 164 byte-for-byte (single source of truth: the heuristic-kind
    # enumeration).
    type: object
    required:
      - marker_class
      - sub_classification
      - story_id
    additionalProperties: false
    properties:
      marker_class:
        type: string
        enum: [heuristic-skipped]
      sub_classification:
        type: string
        enum: [empty-state, error-state, auth-boundary]
      story_id:
        type: string
        minLength: 1
