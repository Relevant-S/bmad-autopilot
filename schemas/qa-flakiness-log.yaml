# QA-flakiness-log schema (Story 20.2 / FR-P2-8 — longitudinal QA signal).
#
# Contract anchors:
#   - Story 20.2 (this schema's authoring; epics-phase-2.md lines 768-781).
#     The on-disk record format for the per-AC, per-run pass/fail history
#     accumulated ACROSS runs at `_bmad-output/qa-flakiness/{story-id}.yaml`
#     (gitignored, practitioner-local; the qa-evidence / retry-history
#     precedent). This story lands the SUBSTRATE ONLY — NO marker. The
#     `flakiness-threshold-exceeded` marker + qa-runbook threshold config +
#     `agents/qa.md` per-run wiring are ALL Story 20.3; reference-run
#     accumulation is Story 20.4.
#   - FR-P2-8 (prd.md line 951) — "longitudinal flakiness signal … design
#     from real data". This schema is the inspectable corpus the threshold
#     (20.3) and reference runs (20.4) are designed against.
#   - NFR-O2 (prd.md line 1016) — plain, human-readable YAML; a practitioner
#     can `cat` the file and read the per-AC history inline.
#   - NFR-O3 (prd.md line 1017) — trace linkability; `evidence_ref` points
#     back into the FR49 qa-evidence tree so a flaky record ties to the run's
#     evidence.
#   - Two-tier retry model (prd.md line 1044) — `retry_count_within_run` is
#     the ACTION-LEVEL (Playwright-native) retry count, NOT the orchestrator
#     whole-story retry budget. A run with action-level retries that
#     ultimately passed is itself a flakiness signal even though `status` is
#     `pass`.
#   - NFR-R1 (prd.md line 980) — writes go through temp-file-plus-atomic-
#     rename (the persistence library reuses `run_state.atomic_write_text`).
#   - ADR-003 substrate closure at FIVE (architecture.md) — this schema is a
#     cell-1 data artifact, NOT a sixth substrate component; meta-validation
#     reuses the existing `load_schema` family, no new CI gate.
#
# Retention policy (documented contract):
#   The persistence library trims each AC's `runs` to the last N records
#   (default 30, configurable via the `append_run_record` `retention`
#   parameter): append-then-trim-oldest. `runs` is ordered oldest -> newest;
#   the newest record is always the last element. The retention cap is a
#   library parameter at this landing; any qa-runbook `flakiness.retention_runs`
#   surface is Story 20.3 scope.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://bmad-autopilot.local/schemas/qa-flakiness-log.yaml"
schema_version: "1.0"
title: "QA-Flakiness-Log"
description: >-
  Per-story longitudinal QA flakiness log (FR-P2-8): for each acceptance
  criterion, the ordered pass/fail history across runs. Persisted at
  _bmad-output/qa-flakiness/{story-id}.yaml (gitignored, practitioner-local).
  Append-only with retention trimming (default last 30 runs per AC,
  append-then-trim-oldest). See the contract-header comment block above for
  the full FR/NFR/ADR anchor set and the retention-policy contract.

type: object
required:
  - schema_version
  - story_id
  - acs
additionalProperties: false

properties:
  schema_version:
    type: string
    enum: ["1.0"]
    description: >-
      Schema version of this flakiness-log document. Closed enum at the
      Phase-2 introduction so a future MINOR/MAJOR bump requires an explicit
      additive change rather than silent acceptance. Mirrors the
      run-state.yaml / epic-run-state.yaml closed-enum posture.

  story_id:
    type: string
    minLength: 1
    description: >-
      BMAD-domain per-story identifier (e.g. "20-2-flakiness-log-schema-
      persistence-fr-p2-8"). Composes the on-disk file path
      _bmad-output/qa-flakiness/{story-id}.yaml; path-hardened by the
      persistence library so it cannot escape the umbrella.

  acs:
    type: array
    description: >-
      The per-AC flakiness histories for this story. One entry per acceptance
      criterion that has accumulated at least one run record.
    items:
      type: object
      required:
        - ac_id
        - runs
      additionalProperties: false
      properties:
        ac_id:
          type: string
          minLength: 1
          description: >-
            The acceptance-criterion identifier (e.g. "AC-1") whose run
            history is recorded in `runs`.
        runs:
          type: array
          description: >-
            The pass/fail records for this AC, ordered oldest -> newest. The
            retention policy trims this array to the last N records (default
            30, configurable; append-then-trim-oldest) so the newest record
            is always the last element.
          items:
            type: object
            required:
              - run_id
              - timestamp
              - status
              - retry_count_within_run
              - evidence_ref
            additionalProperties: false
            properties:
              run_id:
                type: string
                minLength: 1
                description: >-
                  The QA run identifier this record was produced under
                  (correlates with the qa-evidence run directory).
              timestamp:
                type: string
                pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?Z$"
                description: >-
                  ISO-8601 UTC instant the run record was created
                  (YYYY-MM-DDTHH:MM:SSZ; uppercase T and trailing Z). Allocated
                  via an injected clock in the library for test determinism.
              status:
                type: string
                enum:
                  - pass
                  - fail
                description: >-
                  The run-level outcome for this AC: `pass` or `fail` (closed
                  enum). Note a `pass` with a non-zero `retry_count_within_run`
                  is itself a flakiness signal.
              retry_count_within_run:
                type: integer
                minimum: 0
                description: >-
                  The ACTION-LEVEL (Playwright-native) retry count within this
                  run — the "action-level" tier of the two-tier retry model
                  (prd.md line 1044), DISTINCT from the orchestrator
                  whole-story retry budget. A run that ultimately passed after
                  action-level retries is a flakiness signal even though
                  `status` is `pass`.
              evidence_ref:
                type: string
                minLength: 1
                description: >-
                  A pointer into the FR49 qa-evidence tree
                  (_bmad-output/qa-evidence/{story-id}/{run-id}/…) tying this
                  longitudinal record back to the run's evidence (NFR-O3 trace
                  linkability). Dangling-ref detection is forward scope (not
                  wired here).
