# Dependency failure-profile manifest (cell-1 portable artifact per ADR-002).
#
# Contract anchors:
#   - SDN-001 — Dependency Failure-Profile Schema (architecture.md
#     lines 608–763). § Schema (lines 624–730) is the canonical structural
#     source for this file. § Consumers (lines 732–737) names the downstream
#     consumers (Epic 7 init, Epic 6 runtime, FR65 audit) that read this
#     file's parsed shape via loud_fail_harness.dependencies_validator's
#     load_dependencies() helper.
#   - ADR-002 cell-1 portability classification — this manifest is a cell-1
#     (Host-Portable / Methodology-Portable) artifact: failure profiles are
#     policy taxonomy, primitive-agnostic, and methodology-agnostic.
#   - ADR-003 substrate component 4 (extended) — every marker_class /
#     emits_marker reference declared here is cross-validated against
#     schemas/marker-taxonomy.yaml by the harness's enumeration_check
#     (substrate component 4; story 1.5). Drift fails CI loudly.
#   - NFR-I1 (range tracking) + NFR-I3 (per-failure-profile degradation) —
#     this manifest is the single declarative source NFR-I1 / NFR-I3 name.
#   - FR37 (init precondition checks consume this file) + FR38 (init blocks
#     installation until hard-deps met).
#   - FR30 (marker-taxonomy.yaml is the authoritative marker enumeration;
#     marker_class fields here REFERENCE that taxonomy — single-source-of-
#     truth discipline).
#   - Pattern 1 (snake_case structural keys: schema_version, dependencies,
#     version_floor, version_ceiling_policy, version_policy, phase, profiles,
#     by_project_type, profile, diagnostic, diagnostic_pointer, marker_class,
#     sub_classifications, condition, emits_marker, silent; kebab-case
#     identifier values: dependency identifiers, profile enum values, phase
#     keys, project-type keys, marker class identifiers).
#
# This file encodes a contract validated by CI; modify with care.
# Customization may break harness reconciliation checks.
#
# Versioning discipline (per SDN-001 § Versioning Discipline):
#
#   - Schema-structure changes (adding a profile class, adding a lifecycle
#     phase, changing field semantics) → MAJOR version bump with CI
#     consistency review and downstream consumer updates.
#   - Adding a new dependency entry                → MINOR version bump
#     (additive, backward-compatible).
#   - Updating a dependency's profile (e.g. graceful-degrade → total-block)
#                                                  → MINOR version bump with
#     explicit migration guidance for operators.
#
# Co-versioned with schemas/marker-taxonomy.yaml: marker-class additions or
# removals affect both files; reconciliation review covers both per ADR-003
# substrate component 4 (extended). Substrate component 4 (story 1.5's
# enumeration_check) is the CI mechanism that enforces consistency between
# this manifest's marker-class references and the taxonomy.
#
# This file is YAML data, NOT a JSON Schema document — no `$schema` keyword,
# no `type: object` directive, no meta-schema validation. Shape enforcement
# is by tools/loud-fail-harness/src/loud_fail_harness/dependencies_validator.py
# (story 1.6); enumeration cross-validation is by enumeration_check
# (story 1.5; substrate component 4 extended).
#
# Optional `phase` field semantics (per SDN-001 Open Items): absence means
# MVP-scope; non-MVP values declare the phase in which the dependency
# activates (e.g. `phase: "1.5"` for Phase 1.5 dependencies). Schema-loading
# code in the harness MUST treat absence as MVP rather than as missing data.
#
# Canonical entry order (preserve verbatim — re-ordering loses architectural
# narrative semantics): MVP-required dependencies first (git, claude-code,
# bmad-core, tea-module, playwright-mcp), then Phase-1.5 dependencies
# (mobile-mcp, lad), then Phase-2 dependencies (axe-core, pixelmatch,
# background-primitive).

schema_version: "1.8"
# schema_version 1.1 → 1.2: mobile-mcp activated from phase: "1.5" gate;
# version_floor pinned to 0.0.54 per ADR-007 (Story 9.1, 2026-05-11).
# schema_version 1.2 → 1.3: mobile-mcp init + runtime profiles declare
#                           sub_classification fields (init-unavailable +
#                           mid-run-unavailable respectively) per Story 9.5
#                           to make the init-time vs mid-run emission paths
#                           distinct in the PR bundle.
# schema_version 1.3 → 1.4: lad activated from phase: "1.5" gate;
#                           version_floor pinned to bb47e9e (resolved short
#                           SHA of Shelpuk-AI-Technology-Consulting/
#                           lad_mcp_server HEAD at implementation time per
#                           ADR-008). Story 10.1, 2026-05-12.
# schema_version 1.4 (post-Story-12.2): lad's `configured-but-api-key-missing`
#                           sub_classification entries (both `init` and `runtime`
#                           profiles) were RETIRED per Sprint Change Proposal
#                           2026-05-18 + Story 12.2 — validation-responsibility-
#                           boundary correction. Third-party credential validation
#                           belongs to the upstream `lad_mcp_server` MCP boundary,
#                           not to bmad-autopilot. After Story 12.2 each profile's
#                           `sub_classifications:` list shrinks to its remaining
#                           `unconfigured` entry (`silent: true`).
# schema_version 1.4 → 1.5: git added as MVP dependency entry (version_floor "2.5";
#                           profile total-block at init + runtime) per ADR-009
#                           worktree-vs-branch boundary decision. Phase-2 worktree-
#                           lifecycle substrate (Stories 14.2–14.6) depends on
#                           git ≥ 2.5 worktree primitive. Story 14.1, 2026-05-25.
# schema_version 1.5 → 1.6: axe-core added as Phase-2 a11y-audit dependency
#                           entry (opt-in-skip; version_floor "4.12") per
#                           ADR-011 (FR-P2-6). Web-only-meaningful, silent
#                           unless qa-runbook.a11y.enabled; runtime emission +
#                           the three a11y evidence markers land in Story 19.4.
#                           Story 19.3.
# schema_version 1.6 → 1.7: pixelmatch added as Phase-2 visual-regression
#                           dependency entry (opt-in-skip; version_floor "7.2")
#                           per ADR-012 (FR-P2-10). Web-AND-mobile-meaningful
#                           (api does not invoke), silent unless
#                           qa-runbook.visual_regression.enabled; runtime
#                           emission + the two visual-regression evidence markers
#                           land in THIS story (no split). Story 19.5.
# schema_version 1.7 → 1.8: background-primitive added as Phase-2 background-
#                           execution dependency entry (opt-in-skip; phase: "2";
#                           version_floor "2.1.179" — the Claude Code version the
#                           Story 21.1 spike assessed the daemon-backed
#                           background-session primitive at) per FR-P2-7 / the
#                           spike verdict `partially-stable` → path `partial`.
#                           Silent unless `_bmad/automation/config.yaml`
#                           `background_execution: true` (the line-864 opt-in-skip-
#                           silence obligation, satisfied structurally). NO
#                           marker_class field (mirrors lad/axe-core/pixelmatch —
#                           the `background-primitive-unstable` marker is
#                           enumerated in marker-taxonomy.yaml independently and
#                           emitted at runtime, not pinned through this entry).
#                           Story 21.2, 2026-06-17.

dependencies:
  git:
    version_floor: "2.5"
    version_ceiling_policy: "tracked-against-git-releases; primitive-deprecation triggers version-pin review"
    profiles:
      init:
        profile: total-block
        diagnostic: "git v2.5+ required (worktree primitive). Run `git --version` to check."
        marker_class: env-setup-failed
      runtime:
        profile: total-block

  claude-code:
    version_floor: "2.1.32"
    version_ceiling_policy: "tracked-against-current-releases; primitive-deprecation triggers version-pin review"
    profiles:
      init:
        profile: total-block
        diagnostic: "Claude Code v2.1.32+ required. Run `claude --version` to check."
        marker_class: env-setup-failed
        sub_classification: claude-code-version-mismatch
      runtime:
        profile: total-block

  bmad-core:
    version_floor: "6.0"
    version_ceiling_policy: "tracked-against-bmad-releases; upstream-absorption event triggers version-pin review"
    profiles:
      init:
        profile: total-block
        diagnostic: "BMAD core v6.0+ required."
        marker_class: env-setup-failed
        sub_classification: bmad-core-version-mismatch
      runtime:
        profile: total-block

  tea-module:
    version_policy: "version-agnostic; detected at init"
    profiles:
      init:
        profile: total-block
        diagnostic: "TEA module not installed. Run `/bmad:install tea` and re-run `/bmad-automation init`."
        marker_class: env-setup-failed
        sub_classification: tea-module-missing
      runtime:
        profile: total-block

  playwright-mcp:
    version_floor: "officially-supported-as-of-mvp-release"
    by_project_type:
      web:
        profiles:
          init:
            profile: total-block
            diagnostic: "Playwright MCP unreachable. Required for web QA. See docs/playwright-mcp-setup.md."
            marker_class: playwright-mcp-unavailable
          runtime:
            profile: graceful-degrade
            marker_class: env-setup-failed
            diagnostic_pointer: "Playwright MCP unavailable mid-run; QA phase skipped with marker."
      api:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip
      mobile:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip

  mobile-mcp:
    version_floor: "0.0.54"
    by_project_type:
      mobile:
        profiles:
          init:
            profile: total-block
            diagnostic: "Mobile MCP required for mobile projects. See docs/mobile-mcp-setup.md."
            marker_class: mobile-blocked
            sub_classification: init-unavailable
          runtime:
            profile: graceful-degrade
            marker_class: mobile-blocked
            sub_classification: mid-run-unavailable
            diagnostic_pointer: "Mobile MCP unavailable mid-run; mobile QA phase skipped."
      web:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip
      api:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip

  lad:
    version_floor: "bb47e9e"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  axe-core:
    version_floor: "4.12"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  pixelmatch:
    version_floor: "7.2"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  background-primitive:
    phase: "2"
    version_floor: "2.1.179"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
