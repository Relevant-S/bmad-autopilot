# QA specialist return envelope (Story 2.10 → Story 4.13 → Story 9.3 → Stories 19.2/19.5; FR55).
# Mobile dispatch branch — driver=mobile per Story 9.3 qa_ac_iteration.py dispatch.
#
# Authored to validate against the UNMODIFIED schemas/envelope.schema.yaml
# (additionalProperties: false; not.anyOf sensor-not-advisor clause) per Story
# 19.6 AC-7. Exercises TWO of the three Epic-19 QA-coverage surfaces (NO
# a11y_emissions — a11y is web-only per NFR-I3; mobile does not invoke):
#   - heuristic_skipped_emissions — the 6-of-7 mobile heuristic subset (Story
#     19.2 / MOBILE_HEURISTIC_SPECS). Of the six dispatched, five are applicable
#     (evidence rides the per-AC evidence_refs + top-level artifacts heuristics/
#     paths) and one (permission-boundary) is structurally inapplicable and
#     emits a heuristic-skipped marker. rate-limit-boundary is SILENTLY
#     matrix-excluded on mobile per ADR-010 — it is NOT dispatched and emits NO
#     marker (a heuristic-skipped marker for a matrix-excluded heuristic would
#     be a doctrine violation). The one skipped sub_classification
#     (permission-boundary) is among the four 19.2-added values ∈ the closed
#     7-value enum at $defs/heuristic_skipped_emission.
#   - visual_regression_emissions — the mobile visual regression audit (Story
#     19.5 / FR-P2-10 / ADR-012). First run: no baseline PNG exists, so a
#     baseline is created per AC (via the mobile-mcp mobile_take_screenshot
#     surface) and visual-regression-baseline-missing emits (informational).
#     required: [marker_class, ac_id] per $defs/visual_regression_emission.
#
# NO a11y_emissions (web-only; mobile + api do not invoke per NFR-I3 — recorded
# explicitly in narrative.md). Captured baselines are NOT committed:
# _bmad-output/qa-visual-baseline/ is gitignored; the records CITE the gitignored
# path. These emissions are story-level evidence, NOT AC gates — they do not flip
# ac_results (sensor-not-advisor). Evidence is mobile-mcp-sourced
# (mobile_list_elements_on_screen a11y-tree JSON = Tier-1; mobile_take_screenshot
# PNG = Tier-2).
