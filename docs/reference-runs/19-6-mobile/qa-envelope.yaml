    status: pass
    assertions:
      - "main flow: a logged-in user adds an item to the cart and the cart line count increments"
      - "exploratory empty-state (applicable): the empty-cart state renders its zero-items affordance before the first add"
      - "exploratory large-input-boundary (applicable): a quantity at the per-line ceiling is clamped, not overflowed"
    evidence_refs:
      - path: _bmad-output/qa-evidence/sample-qa-coverage-mobile-001/run-001/ac-1/main-add-to-cart-elements.json
        tier: tier-1-mechanical
