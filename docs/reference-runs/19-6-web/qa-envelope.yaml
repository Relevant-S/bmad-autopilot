#     and a11y-baseline-stale emits (informational). ac_id REQUIRED for the
#     AC-scoped class per $defs/a11y_emission.
#   - visual_regression_emissions — the web+mobile visual regression audit
#     (Story 19.5 / FR-P2-10 / ADR-012). First run: no baseline PNG exists, so a
#     baseline is created per AC and visual-regression-baseline-missing emits
