#     witnessed (not just the MVP trio). Each sub_classification ∈ the closed
#     7-value enum at $defs/heuristic_skipped_emission.
#   - a11y_emissions — the web-only a11y audit (Story 19.4 / FR-P2-6 / ADR-011).
