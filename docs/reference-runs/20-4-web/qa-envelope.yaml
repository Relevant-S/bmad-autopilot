# Web dispatch branch — driver=playwright per Story 4.4 qa_ac_iteration.py dispatch.
#
# Authored to validate against the UNMODIFIED schemas/envelope.schema.yaml
# (additionalProperties: false; not.anyOf sensor-not-advisor clause) per Story
# 20.4 AC-6. This is the FIRST reference-run envelope to exercise the two
# Epic-20 QA-evidence surfaces:
#   - plan_rederivation (FR-P2-9 / Story 20.1) — the GREEN path. The AC text is
#     unchanged across runs (ac_hash matches), so the QA wrapper took the
#     `reuse-existing` path, re-derived the plan, and cross-checked it against
#     the persisted `## QA Behavioral Plan`. The persisted and re-derived plans
#     agree at all three drift surfaces (heuristic_applicability / flow_branches /
#     the semantic_verification_tier pair), so cross_check_status is `green` and
#     NO plan-rederivation-drift-detected marker fires. The FLAT $defs/plan_rederivation
#     projection carries only `cross_check_status` on green (the conditional
#     story_id / drift_surfaces / drifted_ac_ids fields are required ONLY on
#     drift — witnessed in the sibling qa-envelope-rederivation-drift.yaml).
#   - flakiness_emissions (FR-P2-8 / Story 20.3) — run-003 is the 3rd accumulating
#     run. AC-2's trailing three flakiness-log records (run-001/002/003) each carry
#     retry_count_within_run >= 1 (the action-level transient-fail predicate), so
#     AC-2 crosses the default threshold (3 consecutive / >= 1 transient fail; the
#     qa-runbook `flakiness:` block is absent => defaults apply, NOT a marker) and
#     flakiness-threshold-exceeded emits for AC-2 against the unmodified
#     $defs/flakiness_emission (FLAT, required: [marker_class, ac_id]). AC-1's
#     trailing records are all retry_count_within_run: 0, so it stays silent
#     (no-marker-on-absence parity). The accumulated corpus is committed as the
#     snapshot qa-flakiness-log.yaml in this directory.
#
# Both Epic-20 markers are STORY-LEVEL EVIDENCE (sensor-not-advisor): neither
# flips any AC's pass/fail nor contributes to the wrapper-level `status` — exactly
# like a11y-* / visual-regression-* / heuristic-skipped / plan-drift-detected. The
# run still reaches merge-ready. The Epic-19 arrays (heuristic_skipped_emissions /
# a11y_emissions / visual_regression_emissions) are carried forward structurally
# from the 19-6-web posture so the migrated "latest" pointer stays a faithful
# full-capability capture.
