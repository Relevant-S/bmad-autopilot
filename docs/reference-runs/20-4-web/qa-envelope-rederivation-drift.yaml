  - _bmad-output/qa-evidence/sample-qa-coverage-001/run-004/ac-3/main-order-confirmation-action.json
  - _bmad-output/qa-evidence/sample-qa-coverage-001/run-004/heuristics/rate-limit-boundary-ac-2.json
findings: []
rationale: "Follow-on run (run-004) of sample-qa-coverage-001 after the qa-runbook was edited to declare rate-limit-boundary applicable to AC-2. The AC text is unchanged (ac_hash matches), so the wrapper took the reuse-existing path and re-derived the plan; the FR-P2-9 cross-check (Story 20.1) compared the re-derived plan against the persisted ## QA Behavioral Plan and found a mismatch at the heuristic_applicability drift surface for AC-2 (the persisted plan, written on run-001, declares no rate-limit-boundary for AC-2; the re-derived plan does), so cross_check_status: drift-detected and plan-rederivation-drift-detected emits naming drift_surfaces: [heuristic_applicability], drifted_ac_ids: [AC-2]. The persisted plan is NOT overwritten — FR-P2-9 is a read-only cross-check (Story 20.1 AC-3); FR23's plan_status reset on AC-hash drift remains the only refresh trigger, and the AC text did not change. The drift marker is story-level evidence — it does NOT flip ac_results (all three ACs still pass) and the run reaches merge-ready."
