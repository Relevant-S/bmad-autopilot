# QA specialist return envelope — SUPPLEMENTARY drift-run witness (run-004) per Story 20.4.
# Web dispatch branch — driver=playwright per Story 4.4 qa_ac_iteration.py dispatch.
#
# This is the second of the two Epic-20 supplementary witness files (the
# deviation from the strict nine-file 19.6 set, enumerated in README's artifact
# table): a follow-on run of the SAME story (sample-qa-coverage-001) capturing the
# FR-P2-9 cross-check on its DRIFT-DETECTED branch.
#
# The cross-check is per-run state, so witnessing both green and drift requires
# two run captures. The primary qa-envelope.yaml (run-003) witnessed `green`; THIS
# envelope (run-004) witnesses `drift-detected`.
#
# The drift driver (narrative.md § FR-P2-9 plan re-derivation cross-check):
# between run-003 and run-004 the practitioner edited the qa-runbook to declare
# the `rate-limit-boundary` heuristic APPLICABLE to AC-2 (it had been
# structurally inapplicable — surfaced as a heuristic-skipped marker on every
# prior run). The AC *text* is unchanged, so ac_hash matches and the QA wrapper
# takes the `reuse-existing` path (FR23's plan_status reset does NOT fire — that
# is the AC-hash channel, which this does not touch). The re-derived plan now
# carries `rate-limit-boundary` in AC-2's heuristic_applicability while the
# PERSISTED `## QA Behavioral Plan` (written on run-001) does not, so the
# FR-P2-9 read-only cross-check (Story 20.1) finds a mismatch at the
# `heuristic_applicability` drift surface and surfaces
# plan-rederivation-drift-detected. The persisted plan is NOT overwritten (AC-3
# of Story 20.1 — FR-P2-9 is a read-only cross-check; FR23's plan_status reset on
# AC-hash drift remains the ONLY trigger for plan refresh).
#
# Authored to validate against the UNMODIFIED schemas/envelope.schema.yaml — the
# $defs/plan_rederivation conditional `if cross_check_status == drift-detected then
# required: [story_id, drift_surfaces, drifted_ac_ids]` branch (AC-6). drift_surfaces
# is the non-empty subset [heuristic_applicability]; drifted_ac_ids is [AC-2].
#
# The drift marker is STORY-LEVEL EVIDENCE (sensor-not-advisor): ac_results stay
# pass and the run still reaches merge-ready. No flakiness_emissions on this run
# (the corpus snapshot is captured at the run-003 point; this follow-on's net-new
# witness is the drift branch, not flakiness accumulation).
