# Review-BMAD specialist envelope — partial layer failure with surviving
# layers' findings flowing through (FR28 graceful degradation).
#
# Source list: PRD Reference Artifacts (line 653) names canonical envelope
# shapes. This fixture lands with Story 3.1 to extend the canonical Review-BMAD
# corpus with the partial-layer-failure shape — the Story 3.3 consumer's input
# fixture. NOT the orchestrator-side `review-layer-failed` marker emission
# (which lands in Story 3.3 per epics.md lines 1671-1715); THIS fixture only
# proves the wrapper-side `failed_layers` declaration shape per Story 3.1
# AC-3 contract 2.
