# Per FR28 graceful degradation: when one layer crashes/times-out/exits-non-zero
# but at least one other layer surfaces findings successfully, the wrapper
# does NOT kill the overall review. The surviving layers' findings flow
# through the envelope normally; `failed_layers` carries the failed layer's
# name; `status` reflects the surviving layers' verdict (here `pass` because
# no HIGH-severity patch-bucket findings). bmad-code-review's
# step-02-review.md line 27 already drops the failed layer's contribution
# from the findings stream; the wrapper preserves that behavior verbatim.
#
# Downstream consumers: Story 3.3 (orchestrator-side `review-layer-failed`
# marker emission per FR28) consumes THIS fixture's `failed_layers` field;
# Story 3.4 consumes the surviving findings for PR-bundle rendering; Story
# 3.5 audits the actual layer composition. Validated against
# schemas/envelope.schema.yaml by the harness CI gate (envelope-validator).

