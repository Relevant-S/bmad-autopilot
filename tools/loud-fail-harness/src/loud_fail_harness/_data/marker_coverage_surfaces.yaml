    description: |-
      FR33 fixture-driven reconciliation CI gate (Story 1.8). Tests harness reconciler logic
      against synthetic fixtures; complementary to Story 6.3's static audit and Story 6.8's
      runtime gate.
  - name: reconciliation-gate-runtime
    category: reconciliation-gate
    file_paths:
