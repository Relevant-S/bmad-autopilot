    description: |-
      FR33 runtime reconciliation gate (Story 6.8). Detects skip-events that the actual
      reference-project run produced but no marker emission captured; complementary to
      Story 1.8's fixture-driven gate and Story 6.3's static audit.
  - name: specialist-wrapper-dev
    category: specialist-wrapper
    file_paths:
