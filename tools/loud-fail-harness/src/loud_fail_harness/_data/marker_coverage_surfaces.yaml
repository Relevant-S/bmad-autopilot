# Marker emission coverage audit data (Story 6.3).
#
# Authoritative source for the (marker_class × code_surface) coverage matrix
# walked by tools/loud-fail-harness/src/loud_fail_harness/marker_coverage_audit.py.
# Static-analysis substrate complementing Story 1.8's fixture-driven gate
# (fr33_fixture_gate.py) and Story 6.8's runtime gate (forward-scheduled).
#
# Schema:
#   schema_version: "1.0"
#   surfaces:                  # the canonical code-surface inventory
#     - name: <kebab-case>
#       category: <orchestrator|specialist-wrapper|hook|bundle-assembler|cost-telemetry|reconciliation-gate>
#       file_paths: [<relative-to-repo-root>, ...]
#       description: <one-line>
#   verdicts:                  # one row per (marker_class × surface_name) intersection
#     - marker_class: <kebab-case from marker-taxonomy.yaml>
#       surface_name: <matches a surface above>
#       verdict: <emitted|not-applicable|scheduled-by-story|gap>
#       code_path: <file:line>          # required when verdict == emitted
#       rationale: <prose>              # required when verdict in {not-applicable, scheduled-by-story}
#       discharging_story: <X.Y>        # required when verdict == scheduled-by-story
#       audit_date: "YYYY-MM-DD"
#
# Verdict semantics (per Story 6.3 AC-2):
#   - emitted: production code path exists at code_path that emits the marker.
#   - not-applicable: marker is structurally inapplicable to this surface (rationale required).
#   - scheduled-by-story: marker IS expected at this surface but the emission code
#     hasn't landed yet (discharging_story + rationale required).
#   - gap: TRUE gap; production data MUST NOT carry gap verdicts at Story 6.3 close.
#
# Contributor extension (per Story 6.3 AC-4):
#   To add a new code surface or marker class:
#     1. Append a row to `surfaces:` (new surface) or `verdicts:` (new (marker × surface)
#        intersection — and one row per existing surface for a new marker class).
#     2. Regenerate the artifact via `uv run marker-coverage-audit --regenerate`.
#     3. Commit both files together.
#
# Schema-version history:
#   1.0 (Story 6.3) — initial landing.

schema_version: "1.0"

surfaces:
  - name: bundle-assembler
    category: bundle-assembler
    file_paths:
      - tools/loud-fail-harness/src/loud_fail_harness/bundle_assembly.py
      - tools/loud-fail-harness/src/loud_fail_harness/bundle_assembly_escalation.py
      - tools/loud-fail-harness/src/loud_fail_harness/bundle_assembly_epic.py
    description: |-
      PR-bundle, escalation-bundle, and epic-bundle assembler (Story 2.11 + Story 6.1 +
      Story 15.3). Renders the merge-ready PR bundle from envelope + event log + run-state,
      and the running/final epic-level PR bundle from the epic-run-state cache. The epic
      assembler's main() routes assembler-logic failures through the SAME
      surface_assembly_failure path (bundle_assembly_failure.py) — no new marker class.
  - name: cost-telemetry-pipeline
    category: cost-telemetry
    file_paths:
      - tools/loud-fail-harness/src/loud_fail_harness/cost_telemetry.py
    description: |-
      Per-specialist × per-retry OTel cost-event pipeline (Story 6.4 — ADR-006 Combo 3
      A3' + B1 + C3; NFR-P5). The `cost_telemetry` substrate library is consumed by the
      orchestrator at specialist-return boundaries: `collect()` reads OTel events via the
      `OtelPipelineProtocol` boundary and translates pipeline failures into the
      `cost-telemetry-unavailable` graceful-degrade marker via
      `derive_cost_telemetry_unavailable_marker`. Story 6.5 thickens this surface with
      in-flight cost streaming + 75%-of-ceiling threshold detection.
  - name: hook-session-start
    category: hook
    file_paths:
      - hooks/session-start.sh
    description: |-
      SessionStart hook (FR46). Story 2.7 stub; full reattachment lands in Story 8.1.
  - name: hook-stop
    category: hook
    file_paths:
      - hooks/stop.sh
    description: |-
      Stop hook (FR59). Invokes bundle_assembly substrate to render the merge-ready PR bundle
      at the canonical path.
  - name: hook-subagent-stop
    category: hook
    file_paths:
      - hooks/subagent-stop.sh
    description: |-
      SubagentStop hook (FR58 / FR50 / NFR-O6 / FR12). Commits Dev's proposed_commit_message
      and verifies scope assertion (Story 5.4).
  - name: orchestrator-dispatch-wrapper
    category: orchestrator
    file_paths:
      - tools/loud-fail-harness/src/loud_fail_harness/specialist_dispatch.py
      - tools/loud-fail-harness/src/loud_fail_harness/retry_dispatch.py
      - tools/loud-fail-harness/src/loud_fail_harness/retry_router.py
    description: |-
      Orchestrator-side specialist dispatch wrapper (ADR-004). Owns marker-class registry
      validation, envelope validation, dispatch-event emission, and per-specialist timeout.
  - name: orchestrator-lifecycle-transitions
    category: orchestrator
    file_paths:
      - skills/bmad-automation/workflow.md
      - skills/bmad-automation/steps/run.md
      - skills/bmad-automation/steps/dispatch.md
    description: |-
      Orchestrator skill steps that drive BMAD lifecycle transitions (ready-for-dev → in-
      progress → review → qa → done). LLM-runtime prose; consumes substrate Python via Task
      tool dispatch.
  - name: orchestrator-run-state-helper
    category: orchestrator
    file_paths:
      - tools/loud-fail-harness/src/loud_fail_harness/run_state.py
      - tools/loud-fail-harness/src/loud_fail_harness/branch_lifecycle.py
      - tools/loud-fail-harness/src/loud_fail_harness/orchestrator_run_entry.py
      - tools/loud-fail-harness/src/loud_fail_harness/retry_history.py
    description: |-
      Orchestrator run-state read/write helpers (ADR-005). Owns per-story branch lifecycle,
      run-state atomic writes, and externalized retry history.
  - name: orchestrator-state-machine
    category: orchestrator
    file_paths:
      - tools/loud-fail-harness/src/loud_fail_harness/lifecycle_state_machine.py
      - tools/loud-fail-harness/src/loud_fail_harness/retry_budget.py
      - tools/loud-fail-harness/src/loud_fail_harness/retry_budget_exhaustion.py
    description: |-
      Orchestrator BMAD-lifecycle state machine + retry-budget enforcement (Story 2.4 + Story
      5.1 + Story 5.6). Owns proposed-qa state, retry-budget exhaustion.
  - name: reconciliation-gate-fixture
    category: reconciliation-gate
    file_paths:
