# Input-hardening model-classification registry — Story 24.2 (Epic 24 Action #2).
#
# The CLOSED dual-registry enforced by `input-hardening-gate` (Rule A): every
# BaseModel subclass discovered under src/loud_fail_harness/ MUST appear in
# EXACTLY ONE bucket. A new model cannot merge unclassified — that structural
# property is what makes the 13->14->15->16->18 input-hardening recurrence
# impossible to recur (the marker-taxonomy / fixture-coverage closed-enumeration
# discipline applied to models). Mirrors _data/marker_coverage_surfaces.yaml as a
# package-bundled data file (loaded via importlib.resources, cwd-independent).
#
# externally_constructed: models built from parsed text / on-disk YAML /
#   story-doc frontmatter / config / CLI args / operator edits OR (the QA
#   *DiagnosticContext family) seeded at specialist runtime from parsed plan /
#   evidence data. Each names the string fields carrying a hostile-input surface:
#     identifier_fields  -> harden_identifier        (whitespace/newline/null)
#     path_fields        -> harden_path_segment      (+ separators + '..')
#     dup_key_fields     -> reject_duplicate_identifiers
#   A collection whose ELEMENTS are hardened per-item uses the "<Model>.<field>[]"
#   label (the trailing [] is stripped by the gate to credit the field). Rule B
#   asserts every named field is routed through its helper inside a validator.
#
# internal_only: models constructed solely from already-validated in-process
#   data (envelopes, *Result/*Outcome/*Request, gate-internal Lint*/Finding
#   models, *Emission/*EmissionRecord wrappers around an already-hardened
#   diagnostic context). Exempt BY DESIGN; the registry entry is the
#   rationale-of-record.

externally_constructed:
  epic_run_state.EpicRunState:
    identifier_fields: [epic_id, run_id, story_ids]
    dup_key_fields: [story_ids]
  epic_run_state.SprintRunState:
    identifier_fields: [sprint_id, run_id, epic_ids, unassigned_story_ids]
    dup_key_fields: [epic_ids, unassigned_story_ids]
  run_state.RunState:
    identifier_fields: [branch_name]
    path_fields: [story_id, run_id]
  qa_behavioral_plan.FlowBranch:
    identifier_fields: [branch_id]
  qa_plan_drift.PlanDriftDiagnosticContext:
    identifier_fields: [story_id]
  qa_plan_rederivation.PlanRederivationDiagnosticContext:
    # story_id is the raw external-ingress identifier (hardened). drifted_ac_ids
    # come from QABehavioralPlanEntry.ac_id (internal parsed-plan boundary, like
    # the PlanDriftDiagnosticContext rationale) and drift_surfaces is a closed
    # Literal — neither is a raw hostile-input surface, so only story_id routes
    # through harden_identifier (Story 20.1 / FR-P2-9).
    identifier_fields: [story_id]
  qa_flakiness_log.FlakinessLog:
    # story_id composes the on-disk path _bmad-output/qa-flakiness/{story-id}.yaml
    # (parsed from on-disk YAML), so it is path-hardened — like run_state.RunState's
    # story_id (Story 20.2 / FR-P2-8). schema_version is a closed Literal; acs is a
    # nested-model collection (each FlakinessAcHistory hardens its own ac_id).
    path_fields: [story_id]
  qa_flakiness_log.FlakinessAcHistory:
    # ac_id is the acceptance-criterion identifier parsed from the on-disk log;
    # runs is a nested-model collection (each FlakinessRunRecord hardens its own
    # fields).
    identifier_fields: [ac_id]
  qa_flakiness_log.FlakinessRunRecord:
    # run_id + evidence_ref are raw strings parsed from the on-disk log. evidence_ref
    # is a qa-evidence-tree POINTER carrying path separators, so it is hardened as an
    # identifier (whitespace/newline/null rejected) NOT a path segment. timestamp is
    # format-validated (schema pattern) not hardened, status is a closed Literal, and
    # retry_count_within_run is an int — none are raw hostile-text surfaces.
    identifier_fields: [run_id, evidence_ref]
  qa_flakiness_threshold.FlakinessThresholdDiagnosticContext:
    # story_id is the raw external-ingress identifier; ac_id is supplied by the
    # wrapper from the dispatch ac_list (pre-validated) — both hardened defensively
    # (Story 20.3 / FR-P2-8). consecutive_transient_fail_runs is an int (the
    # trailing transient-fail streak) — NOT a raw hostile-text surface.
    identifier_fields: [story_id, ac_id]
  # FlakinessThresholdConfig is parsed from the on-disk qa-runbook `flakiness:`
  # block (externally constructed) but carries ONLY int knobs range-validated via
  # Field(ge=1) — that constraint IS the hardening boundary; there is NO string
  # hostile-input surface, so Rule A registers it with empty buckets (the
  # qa_visual_regression.VisualDiffResult numeric-only precedent), Rule B has no
  # string field to route, and test_input_hardening._BASELINES carries its
  # valid-construction baseline (Story 20.3 / FR-P2-8).
  qa_flakiness_threshold.FlakinessThresholdConfig: {}
  story_file_lock.LockRecord:
    identifier_fields: [story_id]
  parallel_pollution.StoryClaim:
    identifier_fields: [story_id, aggregate_claim_story_id]
  qa_ac_iteration.SmokeFirstAbortDiagnosticContext:
    # failed_ac_id comes from AcEntry.ac_id (internal_only — parsed plan boundary);
    # only story_id is a raw external-ingress field here.
    identifier_fields: [story_id]
  qa_ac_iteration.FlowBranchSkippedDiagnosticContext:
    # branch_id arrives pre-validated via FlowBranch._harden_identifier_inputs
    # (FlowBranch is externally_constructed with identifier_fields: [branch_id]);
    # ac_id comes from AcEntry.ac_id (internal_only). Only story_id is raw.
    identifier_fields: [story_id]
  qa_evidence_persistence.EvidenceTruncatedDiagnosticContext:
    identifier_fields: [story_id, run_id]
  qa_evidence_tier.Tier3NotConfiguredDiagnosticContext:
    # ac_id comes from AcEntry.ac_id (internal_only — parsed plan boundary);
    # only story_id is a raw external-ingress field here.
    identifier_fields: [story_id]
  qa_exploratory_heuristics.HeuristicSkippedDiagnosticContext:
    identifier_fields: [story_id]
  qa_a11y_audit.AxeViolationKey:
    # rule_id + target_selector are parsed from the browser-supplied axe.run()
    # JSON (violations[].id + the canonicalized violations[].nodes[].target) —
    # the genuinely hostile-input surface (Story 19.4).
    identifier_fields: [rule_id, target_selector]
  qa_a11y_audit.A11yAcScopedDiagnosticContext:
    # story_id is the raw external-ingress identifier; ac_id is supplied by the
    # wrapper from the dispatch ac_list (pre-validated) — both hardened defensively.
    identifier_fields: [story_id, ac_id]
  qa_a11y_audit.A11yRunScopedDiagnosticContext:
    identifier_fields: [story_id]
  # VisualDiffResult is parsed from the pixelmatch tool output
  # {mismatched_pixels, width, height} (Story 19.5) — numeric-only, so it carries
  # NO string hostile-input surface; the fields are range-hardened via
  # Field(ge=0) / Field(gt=0) + a mismatched_pixels<=total_pixels model_validator
  # invariant. Rule A classifies it here; Rule B has no string field to route
  # (empty buckets), and the test_input_hardening _BASELINES corpus carries its
  # valid-construction baseline.
  qa_visual_regression.VisualDiffResult: {}
  qa_visual_regression.VisualRegressionDiagnosticContext:
    # story_id is the raw external-ingress identifier; ac_id is supplied by the
    # wrapper from the dispatch ac_list (pre-validated) — both hardened defensively
    # (Story 19.5). BOTH visual-regression markers are AC-scoped, so one context
    # (no Ac/Run split, unlike a11y).
    identifier_fields: [story_id, ac_id]
  qa_runbook_heuristics_validator.HeuristicOptOutEntry:
    # story_id + ac_key are free-text operator-authored qa-runbook.yaml mapping
    # keys (the genuinely hostile-input surface; Story 19.1). The opt-out *values*
    # are closed-set-checked against FROZEN_HEURISTIC_NAMES in the findings walk.
    identifier_fields: [story_id, ac_key]
  background_dispatch.BackgroundAgentSession:
    # Parsed from the `claude agents --json` array (Story 21.2 / FR-P2-7).
    # story_id is the genuine external-ingress identifier — recovered from the
    # session's dispatched `/bmad-automation run <story-id>` prompt, tracing back
    # to operator input — so it is hardened. session_id / state / waiting_for are
    # daemon-generated status tokens (NOT operator identifiers), so they are not
    # routed through the identifier hardener.
    identifier_fields: [story_id]

# parse_functions: registered free functions that RETURN an externally_constructed
# model (Rule C treats a call to one inside a try-body like a direct construction).
# None registered at landing — the run-state loaders raise typed *ParseError, not
# a bare construction.
parse_functions: []

