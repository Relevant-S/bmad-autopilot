# Story 7.3 test fixture — extended dependencies.yaml exercising:
#   * graceful-degrade init profile (no canonical entry currently uses it
#     at init phase per dependencies.yaml; the fixture exercises the
#     branch structurally per Story 7.3 module docstring + AC-4).
#   * `by_project_type` with a missing project-type key (per AC-7 — the
#     dispatcher records `outcome="silent"` rather than crashing).

schema_version: "1.7"

dependencies:
  # Story 14.1: git MVP dependency entry — version_floor "2.5" pinned per
  # ADR-009 (worktree primitive shipped Git 2.5, July 2015). Both init +
  # runtime profiles total-block; operator-actionable `git --version`
  # diagnostic at init. Exercises substrate component 5 fixture-coverage on
  # the new MVP dependency that the Phase-2 worktree-lifecycle substrate
  # (Stories 14.2–14.6) depends on.
  git:
    version_floor: "2.5"
    version_ceiling_policy: "tracked-against-git-releases; primitive-deprecation triggers version-pin review"
    profiles:
      init:
        profile: total-block
        diagnostic: "git v2.5+ required (worktree primitive). Run `git --version` to check."
        marker_class: env-setup-failed
      runtime:
        profile: total-block

  claude-code:
    version_floor: "2.1.32"
    version_ceiling_policy: "tracked-against-current-releases"
    profiles:
      init:
        profile: total-block
        diagnostic: "Claude Code v2.1.32+ required."
        marker_class: env-setup-failed
        sub_classification: claude-code-version-mismatch
      runtime:
        profile: total-block

  bmad-core:
    version_floor: "6.0"
    version_ceiling_policy: "tracked-against-bmad-releases"
    profiles:
      init:
        profile: total-block
        diagnostic: "BMAD core v6.0+ required."
        marker_class: env-setup-failed
        sub_classification: bmad-core-version-mismatch
      runtime:
        profile: total-block

  tea-module:
    version_policy: "version-agnostic; detected at init"
    profiles:
      init:
        profile: total-block
        diagnostic: "TEA module not installed."
        marker_class: env-setup-failed
        sub_classification: tea-module-missing
      runtime:
        profile: total-block

  # Story 9.1: mobile-mcp activated — phase: "1.5" gate removed, version_floor
  # pinned (steady-state Phase 1.5 shape per ADR-007). Exercises substrate
  # component 5 fixture-coverage on the activated mobile-QA dependency.
  mobile-mcp:
    version_floor: "0.0.54"
    by_project_type:
      mobile:
        profiles:
          init:
            profile: total-block
            diagnostic: "Mobile MCP required for mobile projects. See docs/mobile-mcp-setup.md."
            marker_class: mobile-blocked
            sub_classification: init-unavailable
          runtime:
            profile: graceful-degrade
            marker_class: mobile-blocked
            sub_classification: mid-run-unavailable
            diagnostic_pointer: "Mobile MCP unavailable mid-run; mobile QA phase skipped."
      web:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip
      api:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip

  # Synthetic graceful-degrade init profile — exercises AC-4 branch.
  synthetic-graceful-degrade:
    version_policy: "version-agnostic; synthetic"
    profiles:
      init:
        profile: graceful-degrade
        diagnostic: "Synthetic dependency unavailable; init proceeds with marker."
        diagnostic_pointer: "Synthetic init-time degradation pointer."
        marker_class: env-setup-failed
        sub_classification: tea-module-missing
      runtime:
        profile: graceful-degrade
        marker_class: env-setup-failed
        diagnostic_pointer: "Synthetic dependency unavailable mid-run."

  # Story 10.1: lad activated — phase: "1.5" gate removed, version_floor
  # pinned to upstream short SHA (steady-state Phase 1.5 shape per ADR-008).
  # Exercises substrate component 5 fixture-coverage on the activated
  # 4th-layer-review dependency on both init + runtime profiles. Story 12.2
  # (Sprint Change Proposal 2026-05-18 — validation-responsibility-boundary
  # correction) retired both profiles' `configured-but-api-key-missing`
  # sub_classification entries; each profile's `sub_classifications:` list
  # shrinks to the remaining `unconfigured` entry (`silent: true`).
  lad:
    version_floor: "bb47e9e"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  # Story 19.3: axe-core activated — Phase-2 a11y-audit dependency entry
  # (opt-in-skip; version_floor "4.12") per ADR-011 (FR-P2-6). Web-only-
  # meaningful, silent unless qa-runbook.a11y.enabled; runtime emission + the
  # three a11y evidence markers land in Story 19.4. Exercises substrate
  # component 5 fixture-coverage on the activated a11y-audit dependency
  # (byte-identical shape to the live dependencies.yaml entry).
  axe-core:
    version_floor: "4.12"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  # Story 19.5: pixelmatch activated — Phase-2 visual-regression dependency entry
  # (opt-in-skip; version_floor "7.2") per ADR-012 (FR-P2-10). Web-AND-mobile-
  # meaningful (api does not invoke), silent unless
  # qa-runbook.visual_regression.enabled; runtime emission + the two visual-
  # regression evidence markers land in THIS story (no split). Exercises substrate
  # component 5 fixture-coverage on the activated visual-regression dependency
  # (byte-identical shape to the live dependencies.yaml entry).
  pixelmatch:
    version_floor: "7.2"
    profiles:
      init:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true
      runtime:
        profile: opt-in-skip
        sub_classifications:
          - condition: unconfigured
            silent: true

  # `by_project_type` with NO `mobile` key — exercises AC-7 missing-key path.
  partial-project-type:
    version_floor: "1.0"
    by_project_type:
      web:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip
      api:
        profiles:
          init:
            profile: opt-in-skip
          runtime:
            profile: opt-in-skip
