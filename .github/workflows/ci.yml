name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/loud-fail-harness
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

      - name: Envelope schema gate (substrate component 1)
        run: uv run envelope-validator $(git ls-files '../../examples/envelopes/*.yaml')
