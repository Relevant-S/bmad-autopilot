name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/loud-fail-harness
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

      - name: Envelope schema gate (substrate component 1)
        # Negative-shape fixtures (Story 10.3 AC-4 band: *-fail-shape*.yaml)
        # are excluded from this bulk-validation gate — they fail by
        # construction. Their rejection is CI-enforced via the pytest gate's
        # test_canonical_lad_fail_shape_envelope_rejected +
        # test_cli_lad_fail_shape_envelope_exits_one (run in the prior
        # "Test (pytest)" step).
        run: uv run envelope-validator $(git ls-files '../../examples/envelopes/*.yaml' | grep -v -- '-fail-shape')

      - name: Orchestrator-event schema gate (substrate component 2)
        # ../../ walks up from tools/loud-fail-harness/ (the workflow's
        # working-directory) to repo root where examples/ lives.
        run: uv run event-validator $(git ls-files '../../examples/orchestrator-events/*.yaml')

      - name: Dependencies schema validation gate (SDN-001)
        # Schema-content validator for schemas/dependencies.yaml.
        # Validates the SDN-001 SHAPE: failure_profile enum closure,
        # required fields per profile, profiles-vs-by_project_type mutual
        # exclusion, sub_classifications shape rules. Paired with — but
        # distinct from — the enumeration-check gate that follows
        # (which validates marker_class CROSS-REFERENCES).
        # Ordering rationale: dependencies-validator runs BEFORE
        # enumeration-check so a malformed dependencies.yaml surfaces with
        # a tighter NFR-O5 named-invariant diagnostic FIRST, before
        # enumeration-check's broader "did not parse to YAML mapping"
        # exit-2 path fires (defense-in-depth, not redundancy).
        # No positional arguments — the script discovers
        # schemas/dependencies.yaml from disk via find_repo_root.
        run: uv run dependencies-validator

      - name: Naming lint (Pattern 1 + Pattern 2; story 1.12b)
        # Architectural source: Pattern 1 (casing convention) + Pattern 2
        # (marker class naming format) per architecture.md lines 919-1006;
        # enforcement matrix per architecture.md lines 1031-1032 names
        # Pattern 1's cell-1-schema scope as CI-enforced and Pattern 2 as
        # CI-enforced (refined by story 1.12b AC-2 + AC-3). Codification
        # doc: docs/implementation-patterns.md (story 1.12b AC-1).
        # Validator scope:
        #   - Pattern 1 (snake_case fields; kebab-case identifier values
        #     and entity-identifier dict keys) over the four cell-1 schema
        #     files: schemas/envelope.schema.yaml,
        #     schemas/orchestrator-event.yaml, schemas/marker-taxonomy.yaml,
        #     schemas/dependencies.yaml. Only registered structural surfaces
        #     are checked — see _CASING_RULES in
        #     tools/loud-fail-harness/src/loud_fail_harness/naming_lint.py
        #     for the per-file position-classification table; PRD-canonical
        #     lifecycle/finding literals (e.g. `decision_needed`,
        #     `from_state` enum members) are deliberately exempt per
        #     architecture.md line 955; OTel pass-through dotted attribute
        #     keys are exempt per Pattern 3 / ADR-006 Consequence 5.
        #   - Pattern 2 (marker_class regex `^[A-Za-z][A-Za-z0-9]*(-[A-Za-z0-9]+)+$`
        #     ≥ 2 segments; sub-classification regex
        #     `^[a-z][a-z0-9]*(-[a-z0-9]+)*$`) over schemas/marker-taxonomy.yaml.
        # Exit-code semantics:
        #   0 — clean (no findings).
        #   1 — at least one validation finding (Pattern 1 OR Pattern 2).
        #   2 — harness-level error (file unreadable, YAML parse failure,
        #       top-level not a YAML mapping); NFR-O5 named-invariant
        #       diagnostic shape.
        # Ordering rationale: this gate is structurally a per-file
        # casing/naming shape check. It runs AFTER `dependencies-validator`
        # because dependencies-validator is itself a per-file shape check
        # whose existing ordering rationale (gate-execution-order grouping;
        # malformed dependencies.yaml surfaces with the tighter NFR-O5
        # named-invariant diagnostic FIRST) is preserved. It runs BEFORE
        # `enumeration-check` so per-file casing violations surface with
        # tight per-file diagnostics before downstream cross-reference
        # gates fire (defense-in-depth, not redundancy). The same
        # per-file-before-cross-reference principle that puts
        # dependencies-validator before enumeration-check applies here.
        # No positional arguments — the script discovers the four cell-1
        # schema files from disk via find_repo_root.
        run: uv run naming-lint

      - name: Cross-schema enumeration check (substrate component 4)
        # No positional arguments: enumeration-check resolves
        # schemas/marker-taxonomy.yaml + schemas/orchestrator-event.yaml
        # (and optional schemas/dependencies.yaml — story 1.6) from disk via
        # find_repo_root. The gate is invariant under whether
        # dependencies.yaml exists yet — its absence is gracefully skipped
        # per AC-2 of story 1.5.
        run: uv run enumeration-check

      - name: Fixture coverage gate (substrate component 5)
        # Layer C completeness mitigation per ADR-003: validates the
        # COVERAGE invariant — every marker class enumerated in
        # schemas/marker-taxonomy.yaml has ≥1 synthetic-story fixture
        # under examples/synthetic-stories/, and every fixture's
        # expected_marker resolves to an entry in the taxonomy.
        # Paired with — but DISTINCT from — story 1.8's FR33 fixture-
        # driven gate (which will REPLAY each fixture's expected marker
        # through reconciler.py and assert the reconciliation matches);
        # the two gates are independent and run in series in CI.
        # Ordering rationale: fixture-coverage runs LAST among the
        # validator gates because (a) it depends on the same canonical
        # marker-taxonomy.yaml that enumeration-check (the immediate-
        # prior gate) already validated upstream, AND (b) Layer C's
        # completeness mitigation is the last line of defense before
        # story 1.8's gate consumes the corpus — placing it last makes
        # its "marker class X has no fixture" diagnostic visible AFTER
        # the upstream gates have certified the schema set is internally
        # consistent (defense-in-depth, not redundancy).
        # Operational meaning of a failure: a class added to
        # marker-taxonomy.yaml without a corresponding fixture (or a
        # fixture whose expected_marker is not in the taxonomy) — the
        # FR65 / ADR-003 skip-class-recognition workflow's CI half.
        # No positional arguments — the script discovers
        # examples/synthetic-stories/ + schemas/marker-taxonomy.yaml
        # from disk via find_repo_root.
        run: uv run fixture-coverage

      - name: FR33 fixture-driven reconciliation gate (story 1.8)
        # FR33's loud-fail-marker-completeness invariant over the *known*
        # skip-class set (architecture.md line 219); blocking-not-best-effort
        # per PRD ratification. Replays each fixture's expected_marker
        # through reconciler.py (story 1.4) — synthesizing a per-fixture
        # orchestrator-event payload that schema-validates against
        # schemas/orchestrator-event.yaml (story 1.3), constructing the
        # corresponding skip-event + marker pair, and asserting reconcile()
        # produces a clean MatchedPair. Catches reconciler-logic regressions
        # AND fixture-side declaration drift; per-fixture diagnostics name
        # the failing fixture, expected_marker, and actual reconciliation
        # result.
        # Paired with — but DISTINCT from — story 1.7's fixture-coverage
        # gate (the immediate-prior step), which validates COVERAGE
        # (every taxonomy class has ≥1 fixture). 1.7 = COVERAGE; 1.8 =
        # RECONCILIATION-OF-COVERED.
        # Paired with — but DISTINCT from — story 6.8's runtime FR33 gate
        # (lands in Epic 6), which validates the SAME reconciler against
        # reference-project run logs. Both gates use the same reconciler.py
        # component WITHOUT modification (epics.md line 905 + line 2783);
        # their diagnostics are distinct-shape (epics.md line 2790:
        # "Fixture reconciliation failed: ..." vs. "Runtime reconciliation
        # failed: ..."); both gates coexist in CI (epics.md line 906).
        # Ordering rationale: this gate runs LAST among the harness gates
        # because (a) it depends on the same canonical corpus that
        # fixture-coverage (the immediate-prior gate) just certified well-
        # shaped, (b) it depends on the same canonical marker-taxonomy.yaml
        # that enumeration-check certified internally consistent, (c) it
        # depends on the same canonical orchestrator-event.yaml that
        # event-validator certified instance-document-validatable, and
        # (d) by running LAST, this gate's per-fixture diagnostics are
        # interpretable in the context of upstream gates having ALREADY
        # ruled out structural causes — defense-in-depth ordering, NOT
        # redundancy.
        # Operational meaning of a failure: (a) a regression in
        # reconciler.py's matching logic, OR (b) a fixture-side
        # declaration drift (the fixture's expected_marker no longer
        # reflects what the reconciler produces).
        # No positional arguments — the script discovers
        # examples/synthetic-stories/ + schemas/marker-taxonomy.yaml +
        # schemas/orchestrator-event.yaml from disk via find_repo_root.
        run: uv run fr33-fixture-gate

      - name: FR33 runtime reconciliation gate (story 6.8)
        # FR33's loud-fail-marker-completeness invariant over the *runtime*
        # reference-project surface (architecture.md line 219; PRD § FR33).
        # PAIRED-BUT-DISTINCT from the immediately-prior FR33 fixture-driven
        # gate (story 1.8): both gates compose with reconciler.py (story 1.4)
        # WITHOUT modification (story 6.8 AC-1 + story 1.8 AC-4 — epics.md
        # line 905 + line 2783); they operate on different inputs (fixture
        # gate consumes synthetic-story fixtures from
        # examples/synthetic-stories/; runtime gate consumes captured
        # reference-project run logs from
        # tools/loud-fail-harness/tests/fixtures/runtime-captures/);
        # their CI-failure diagnostics are STRUCTURALLY DISTINCT per AC-2
        # (epics.md line 2790: "Fixture reconciliation failed: ..." vs.
        # "Runtime reconciliation failed: ..."); their exit-code triage is
        # distinct (runtime gate exit 2 = schema-shape-broken OR
        # marker-taxonomy-mismatch; runtime gate exit 1 =
        # runtime-reconciliation-mismatch; clean = exit 0).
        # Replays each capture directory's events.jsonl (per story 2.12) +
        # run-state.yaml (per story 2.2) through reconciler.reconcile,
        # asserting every detected skip-event reconciles to an emitted
        # marker. Per-capture diagnostics name the missing skip-event class
        # AND the captured emission_site code surface so debuggers know
        # which specialist or hook missed the marker emission.
        # Ordering rationale: this gate runs IMMEDIATELY AFTER the fixture-
        # driven gate per the canonical FR33 enforcement-pair sequencing —
        # the fixture gate's reconciler-correctness check runs first;
        # runtime gate's reference-project-completeness check runs second
        # against the same reconciler (defense-in-depth, not redundancy).
        # Operational meaning of a failure: (a) a captured reference-
        # project run produced a skip-event class that no emitted marker
        # reconciled (specialist or hook missed an emission), OR (b) the
        # captured fixture's shape is broken / its active_markers carries
        # a marker class not in schemas/marker-taxonomy.yaml (capture-side
        # fix).
        # No positional arguments — the script defaults to globbing
        # tests/fixtures/runtime-captures/*/ (each subdirectory must
        # contain BOTH events.jsonl AND run-state.yaml). Resolves
        # marker-taxonomy + orchestrator-event schema from disk via
        # find_repo_root. Contributors extend coverage by adding new
        # capture directories per
        # tests/fixtures/runtime-captures/README.md.
        run: uv run fr33-runtime-gate

      - name: Hook-budget gate (story 1.9; FR60 + FR61)
        # FR60 + FR61 + NFR-S4: the ≤3 hooks budget is the hook-sprawl-
        # prevention invariant; the 20-lines-of-bash heuristic is the
        # hook-script-trust-model attack-surface bound (PRD line 972).
        # This gate enforces FR60 (≤3 .sh files at the top level of the
        # inner repo's hooks/ directory) AND FR61 (≤20 effective lines of
        # bash per hook script, with effective-line counting per
        # tools/loud-fail-harness/docs/hook-counting-rules.md — shebang on
        # line 1, blank lines, and comment-only lines are skipped; everything
        # else counts).
        # Invariant under hooks/ not existing: the baseline-zero pass case
        # is the gate's correct posture at this story's landing time
        # (before story 2.7 creates the directory). Story 2.7 lands the
        # canonical 3-hook set — hooks/subagent-stop.sh (FR58 — Dev commit
        # handler), hooks/stop.sh (FR59 — PR bundle assembly),
        # hooks/session-start.sh (FR46 — resumability) per architecture.md
        # lines 1073-1076 — exactly 3 hooks; the gate must continue passing
        # at 2.7's landing without edit.
        # Operational meaning of a CI failure:
        # (a) a 4th hook was added without removing one of the three
        #     (FR60 violation; per PRD line 729 the budget is NOT
        #     revisitable as a relaxation — only renegotiable as a
        #     replacement);
        # (b) one of the existing hook scripts grew past 20 effective
        #     lines (FR61 violation — reduce the script OR factor logic
        #     into a non-hook artifact);
        # (c) a non-UTF-8 or unreadable file lives under hooks/ (exit 2;
        #     harness-level error).
        # Mixed FR60 + FR61 violations both fire as exit 1 — both
        # diagnostics print; neither promotes to exit 2 (FR60 + FR61 are
        # equivalent invariant-tier signals; unlike fr33-fixture-gate's
        # harness-bug-wins rule).
        # Ordering rationale: this gate runs LAST among the harness gates
        # because (a) it operates over a different filesystem surface
        # (hooks/) than the prior gates' inputs (schemas/, examples/);
        # (b) its inputs are the most volatile-during-Epic-2 (story 2.7
        # lands all three hook scripts and 2.x stories evolve hook
        # bodies); (c) running LAST means hook-script-edit churn in
        # 2.7+ stories is reflected on top of an otherwise-clean harness
        # suite — defense-in-depth ordering, NOT redundancy.
        # No positional arguments — the script discovers hooks/ from
        # disk via find_repo_root.
        run: uv run hook-budget-gate

      - name: Pluggability gate (story 1.10a; FR62)
        # FR62 (PRD line 897; architecture.md line 1031) — "CI enforces
        # pluggability no-cross-references — specialist code (Dev, Review-
        # BMAD, QA, Review-LAD) cannot import or reference another
        # specialist." This gate IS the FR62 enforcement mechanism. It
        # operationally underwrites FR63 (PRD line 898) — "removing one
        # specialist requires removing only its orchestrator state
        # transition and its hook-handled artifacts; no other specialist
        # requires modification" — by preventing the cross-references that
        # would force cascading edits on other specialists.
        # Architectural reference: ADR-002 cell-1 invariant + ADR-004
        # architecture.md line 374 + 406 — "sequential dispatch is forced
        # by the pluggability invariant". Specialists are independently
        # rebuildable; cross-references would collapse cell-5's port-cost
        # analysis into a higher cost cell. CI enforcement is the only
        # mechanism that prevents quiet erosion.
        # Invariant under agents/ not existing: the baseline-zero pass
        # case is the gate's correct posture at this story's landing time
        # (before story 2.8 creates the directory). Stories 2.8 / 2.9 /
        # 2.10 land the first three specialist wrapper files —
        # agents/dev-wrapper.md, agents/review-bmad-wrapper.md,
        # agents/qa.md per architecture.md lines 1068-1072 — and the gate
        # must continue passing at each landing without edit; story 5.x
        # (Phase 1.5) lands agents/lad-wrapper.md under the same contract.
        # Operational meaning of a CI failure:
        # (a) a specialist file has been edited to reference another
        #     specialist by path (Rule 1: \bagents/<other>.md\b) or by
        #     multi-hyphen slug (Rule 2: \b<other-slug>\b for slugs
        #     containing at least one hyphen — single-word slugs like
        #     `qa` are deliberately excluded from Rule 2 to avoid
        #     colliding with marker classes, lifecycle states, and
        #     section names);
        # (b) a non-UTF-8 or unreadable file lives under agents/ (exit 2;
        #     harness-level error).
        # Ordering rationale: this gate runs LAST among the harness gates
        # because (a) it operates over a different filesystem surface
        # (agents/) than the prior gates' inputs (schemas/, examples/,
        # hooks/); (b) its inputs are the most volatile-during-Epic-2-
        # and-3 (stories 2.8 / 2.9 / 2.10 / 3.x / 4.x / 5.x land or
        # evolve specialist files); (c) running LAST means specialist-
        # edit churn is reflected on top of an otherwise-clean harness
        # suite — defense-in-depth ordering, NOT redundancy.
        # No positional arguments — the script discovers agents/ from
        # disk via find_repo_root.
        run: uv run pluggability-gate

      - name: No-destructive-resume lint gate (story 8.6)
        # Asserts Stories 8.1 / 8.2 / 8.3 ALL route dispatch decisions
        # through no_destructive_resume_guard.can_dispatch() per
        # epics.md:3389-3393. AST-based scanner (parallel in shape to
        # pluggability-gate but operating on Python source instead of
        # markdown). Three structural rules: A-import-missing,
        # B-callsite-missing, C-inline-reintroduced.
        run: uv run no-destructive-resume-lint

      - name: Input-hardening gate (story 24.2; Epic 24 Action #2)
        # Codifies the input-hardening discipline that was applied-by-memory and
        # re-discovered reactively across five consecutive epics (13 → 14 → 15 →
        # 16 → 18) into a build-time guarantee, making a sixth recurrence
        # structurally impossible. AST-based scanner over src/loud_fail_harness/
        # (parallel in shape to no-destructive-resume-lint / pluggability-gate).
        # Three structural rules:
        #   A — every BaseModel subclass is classified in EXACTLY ONE bucket of
        #       the closed registry _data/input_hardening_registry.yaml
        #       (externally_constructed | internal_only); a new model cannot
        #       merge unclassified (A-unclassified-model / A-double-classified).
        #   B — every externally_constructed model routes each registered
        #       identifier/path/dup field through the shared input_hardening
        #       helper inside a validator (B-field-unhardened).
        #   C — no broad `except (ValueError|KeyError)` silently swallows a
        #       construction ValidationError around a registered-model
        #       construction (C-validationerror-swallowed). NB: in pydantic
        #       v2.13+ ValidationError subclasses ValueError, so the hazard is
        #       the swallow, not a miss (Story 24.2 Dev Agent Record).
        # Exit-code semantics:
        #   0 — clean (no findings).
        #   1 — at least one structural finding (Rule A/B/C).
        #   2 — harness-level error (a scanned file unreadable/non-UTF-8/
        #       non-parseable; the registry data file missing/malformed; or
        #       registry rot — a registered model absent from the governed tree).
        # No new substrate component / no 4th hook / no new specialist / no
        # marker-taxonomy change (build-time gate; closed-set stays 34).
        # Ordering rationale: runs immediately after no-destructive-resume-lint
        # to keep the AST-structural-lint CI-step grouping; its filesystem
        # surface (src/loud_fail_harness/ Python models) is distinct from the
        # prior gates' inputs (schemas/, examples/, agents/, hooks/) — defense-
        # in-depth ordering, NOT redundancy.
        # No positional arguments — the script discovers the harness root from
        # disk via find_repo_root and the registry via importlib.resources.
        run: uv run input-hardening-gate

      - name: Review-layer-failure emission gate (story 3.3; FR28 + FR56)
        # Story 3.3 AC-9: enforces the three-channel atomic-emission
        # code-structure invariant — surface_failed_layers (at
        # tools/loud-fail-harness/src/loud_fail_harness/review_layer_failure.py)
        # is the SINGLE source-of-truth emission path for the failed_layers
        # envelope field, the review-layer-failed marker class string
        # literal, and the meta: review-completeness synthetic-finding
        # discriminator. The gate scans the harness source tree
        # (tools/loud-fail-harness/src/loud_fail_harness/*.py) plus the
        # named-contract documentation (agents/review-bmad-wrapper.md);
        # canonical emission sites are exempted via the allowlist
        # documented in the gate's docstring.
        # Architectural reference: ADR-002 cell-1 invariant + Story 2.2's
        # atomic-write helper pattern (NFR-R8 enforced by API shape, not
        # by developer discipline) + Story 1.10a's pluggability_gate.py
        # regex-rule precedent.
        # Operational meaning of a CI failure:
        # (a) a forbidden direct write to the failed_layers envelope
        #     field outside surface_failed_layers;
        # (b) a forbidden literal occurrence of the review-layer-failed
        #     marker class string outside the canonical emission site;
        # (c) a forbidden append of a finding carrying meta:
        #     review-completeness outside the canonical emission site.
        # Remediation: route the offending emission through
        # surface_failed_layers; or, if the call site is bundle rendering,
        # import REVIEW_LAYER_FAILED_MARKER symbolically rather than
        # using the string literal.
        # No positional arguments — the script discovers the inner repo
        # root from disk via find_repo_root.
        run: uv run review-layer-failure-emission-gate

      - name: MVP completion evidence validator (story 8.7)
        # Asserts docs/mvp-completion-evidence.md has all 102 rows
        # (68 FR + 34 NFR) populated with non-empty cells per
        # epics.md:3410 + 3425-3428. Step 4 final-validation hook per
        # epics.md:3444 — the gate that blocks Epic 8's `done`
        # transition until MVP gaps are remediated. Mirrors
        # `marker-coverage-audit`'s posture (audit-against-closed-
        # enumeration); the validator is library-as-CLI-aid invoked
        # here per Story 8.7 AC-8.
        # Operational meaning of a CI failure:
        # (a) a missing FR/NFR row (e.g., a Phase-1.5 FR was added to
        #     prd.md but `docs/mvp-completion-evidence.md` lacks a row);
        # (b) an empty cell anywhere in the 510-cell matrix (Story 8.7
        #     AC-5's no-empty-evidence discipline);
        # (c) an invalid `Exercising Journey` value (typo or unrecognized
        #     journey label outside the four-element closed set);
        # (d) an `Evidence Link` that does not resolve to an existing
        #     file under the inner repo root AND is not a syntactically-
        #     valid `https://` URL.
        # No positional arguments — the validator discovers
        # docs/mvp-completion-evidence.md from disk via find_repo_root.
        run: uv run mvp-completion-evidence

      - name: Phase 1.5 completion evidence validator (story 11.1)
        # Asserts docs/phase-1.5-completion-evidence.md has all eleven
        # rows (the closed Phase 1.5 enumeration per
        # epics-phase-1.5.md:352-353) populated with non-empty cells per
        # Story 11.1 AC-2; mirrors the Story 8.7 mvp-completion-evidence
        # gate at the prior step. Sibling, not replacement — Phase 1's
        # 102-row gate continues to enforce MVP coverage; THIS gate
        # enforces Phase-1.5-additive coverage.
        # Exits non-zero on:
        # (a) a Phase 1.5 row missing from the artifact (closed-set
        #     enumeration violation);
        # (b) an empty cell anywhere in the 55-cell matrix;
        # (c) an invalid `Status` value (not in delivered|partial|not-shipped);
        # (d) a `delivered` row with `Findings > 0` (integrity invariant);
        # (e) anchor markers missing or out-of-order.
        # The repo-root inference reuses loud_fail_harness._shared.find_repo_root
        # so the gate is `cwd`-independent (mirrors Story 8.7 gate).
        run: uv run phase-1-5-completion-evidence

      - name: Bundle-assembly-failure emission gate (story 6.9; FR59 + NFR-O5)
        # Story 6.9 AC-4: enforces the three-channel atomic-emission
        # code-structure invariant — surface_assembly_failure (at
        # tools/loud-fail-harness/src/loud_fail_harness/bundle_assembly_failure.py)
        # is the SINGLE source-of-truth emission path for the
        # bundle-assembly-failed marker class. The three reinforcing
        # channels (fallback diagnostic file at
        # _bmad-output/pr-bundles/{story_id}/{run_id}.assembly-failure.log,
        # the streaming-terminal stderr line, and the persisted run-state
        # marker for next-cycle loud-fail-block render) MUST agree by
        # construction. The gate scans the harness source tree
        # (tools/loud-fail-harness/src/loud_fail_harness/*.py); canonical
        # emission sites are exempted via the allowlist documented in the
        # gate's docstring (the source-of-truth module + the gate module
        # itself).
        # Architectural reference: Story 3.3's review-layer-failure-
        # emission-gate (the byte-for-byte structural precedent) + Story
        # 2.2's atomic-write helper pattern (NFR-R8 enforced by API shape,
        # not by developer discipline) + Story 1.10a's pluggability-gate
        # regex-rule precedent.
        # Operational meaning of a CI failure:
        # (a) a forbidden literal occurrence of the bundle-assembly-failed
        #     marker class string outside the canonical emission site;
        # (b) a forbidden direct mention of the *.assembly-failure.log
        #     fallback-file suffix outside the canonical emission site.
        # Remediation: route the offending emission through
        # surface_assembly_failure; or, if the call site is bundle
        # rendering, import BUNDLE_ASSEMBLY_FAILED_MARKER symbolically
        # rather than using the string literal.
        # Ordering rationale: runs immediately after
        # review-layer-failure-emission-gate to preserve the emission-gate
        # CI-step grouping per the in-place-additive convention.
        # No positional arguments — the script discovers the inner repo
        # root from disk via find_repo_root.
        run: uv run bundle-assembly-failure-emission-gate

      - name: Flow-branch coverage gate (story 13.5; FR22c)
        # Architectural source: FR22c (within-AC flow-branch enumeration with
        # skip-with-marker discipline) + Sprint Change Proposal 2026-05-20
        # (Epic 13 — the Phase 1 patch epic closing the QA within-AC
        # flow-branch coverage gap) + Architecture Pattern 8 (within-AC
        # flow-branch enumeration — QA).
        # What it enforces: per-AC, per-enumerated-flow-branch coverage
        # reconciliation over a gate-internal fixture corpus
        # (tools/loud-fail-harness/tests/fixtures/flow-branch-coverage/) —
        # every must-visit branch is discharged by recorded per-branch
        # evidence (flow-branch-outcomes.yaml); every intentionally-skipped
        # branch is discharged by replaying the real
        # surface_flow_branch_skipped (story 13.3) and reconciling the
        # resulting heuristic-skipped: flow-branch-<id> marker's
        # sub-classification against the v1.6 marker taxonomy (story 13.6).
        # A must-visit branch with no evidence and no marker is the FR22c
        # contract violation the gate catches. This is the Story-1.7/1.8-
        # pattern blocking CI enforcement of the FR22c contract scaffolded by
        # stories 13.2 (the flow_branches[] schema), 13.3 (the iteration
        # contract), and 13.4 (the agents/qa.md wrapper prompt) — the
        # structural counterweight to the sensor-not-advisor invariant named
        # by Pattern 8.
        # Exit-code semantics:
        #   0 — every branch of every fixture case reconciled cleanly.
        #   1 — at least one fixture-side finding (must-visit-undischarged OR
        #       outcome-declaration-error); recoverable by fixing the fixture
        #       plan or its flow-branch-outcomes.yaml.
        #   2 — harness-level error (fixtures dir missing/unreadable; a plan
        #       unparseable; a flow-branch-outcomes.yaml malformed; marker
        #       taxonomy unreadable/malformed; or flow-branch not declared
        #       under heuristic-skipped in the taxonomy). The harness or its
        #       precondition is broken.
        # Ordering rationale: runs LAST — a fixture-corpus gate over a
        # filesystem surface (tests/fixtures/flow-branch-coverage/) distinct
        # from every prior gate's inputs (schemas/, examples/, hooks/,
        # agents/, runtime-captures/); running last reflects flow-branch
        # fixture churn on top of an otherwise-clean harness suite —
        # defense-in-depth ordering, NOT redundancy.
        # No positional arguments — the script discovers
        # tests/fixtures/flow-branch-coverage/ + schemas/marker-taxonomy.yaml
        # from disk via find_repo_root.
        run: uv run flow-branch-coverage-gate
