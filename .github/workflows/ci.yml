name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/loud-fail-harness
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

      - name: Envelope schema gate (substrate component 1)
        run: uv run envelope-validator $(git ls-files '../../examples/envelopes/*.yaml')

      - name: Orchestrator-event schema gate (substrate component 2)
        # ../../ walks up from tools/loud-fail-harness/ (the workflow's
        # working-directory) to repo root where examples/ lives.
        run: uv run event-validator $(git ls-files '../../examples/orchestrator-events/*.yaml')

      - name: Dependencies schema validation gate (SDN-001)
        # Schema-content validator for schemas/dependencies.yaml.
        # Validates the SDN-001 SHAPE: failure_profile enum closure,
        # required fields per profile, profiles-vs-by_project_type mutual
        # exclusion, sub_classifications shape rules. Paired with — but
        # distinct from — the enumeration-check gate that follows
        # (which validates marker_class CROSS-REFERENCES).
        # Ordering rationale: dependencies-validator runs BEFORE
        # enumeration-check so a malformed dependencies.yaml surfaces with
        # a tighter NFR-O5 named-invariant diagnostic FIRST, before
        # enumeration-check's broader "did not parse to YAML mapping"
        # exit-2 path fires (defense-in-depth, not redundancy).
        # No positional arguments — the script discovers
        # schemas/dependencies.yaml from disk via find_repo_root.
        run: uv run dependencies-validator

      - name: Cross-schema enumeration check (substrate component 4)
        # No positional arguments: enumeration-check resolves
        # schemas/marker-taxonomy.yaml + schemas/orchestrator-event.yaml
        # (and optional schemas/dependencies.yaml — story 1.6) from disk via
        # find_repo_root. The gate is invariant under whether
        # dependencies.yaml exists yet — its absence is gracefully skipped
        # per AC-2 of story 1.5.
        run: uv run enumeration-check

      - name: Fixture coverage gate (substrate component 5)
        # Layer C completeness mitigation per ADR-003: validates the
        # COVERAGE invariant — every marker class enumerated in
        # schemas/marker-taxonomy.yaml has ≥1 synthetic-story fixture
        # under examples/synthetic-stories/, and every fixture's
        # expected_marker resolves to an entry in the taxonomy.
        # Paired with — but DISTINCT from — story 1.8's FR33 fixture-
        # driven gate (which will REPLAY each fixture's expected marker
        # through reconciler.py and assert the reconciliation matches);
        # the two gates are independent and run in series in CI.
        # Ordering rationale: fixture-coverage runs LAST among the
        # validator gates because (a) it depends on the same canonical
        # marker-taxonomy.yaml that enumeration-check (the immediate-
        # prior gate) already validated upstream, AND (b) Layer C's
        # completeness mitigation is the last line of defense before
        # story 1.8's gate consumes the corpus — placing it last makes
        # its "marker class X has no fixture" diagnostic visible AFTER
        # the upstream gates have certified the schema set is internally
        # consistent (defense-in-depth, not redundancy).
        # Operational meaning of a failure: a class added to
        # marker-taxonomy.yaml without a corresponding fixture (or a
        # fixture whose expected_marker is not in the taxonomy) — the
        # FR65 / ADR-003 skip-class-recognition workflow's CI half.
        # No positional arguments — the script discovers
        # examples/synthetic-stories/ + schemas/marker-taxonomy.yaml
        # from disk via find_repo_root.
        run: uv run fixture-coverage

      - name: FR33 fixture-driven reconciliation gate (story 1.8)
        # FR33's loud-fail-marker-completeness invariant over the *known*
        # skip-class set (architecture.md line 219); blocking-not-best-effort
        # per PRD ratification. Replays each fixture's expected_marker
        # through reconciler.py (story 1.4) — synthesizing a per-fixture
        # orchestrator-event payload that schema-validates against
        # schemas/orchestrator-event.yaml (story 1.3), constructing the
        # corresponding skip-event + marker pair, and asserting reconcile()
        # produces a clean MatchedPair. Catches reconciler-logic regressions
        # AND fixture-side declaration drift; per-fixture diagnostics name
        # the failing fixture, expected_marker, and actual reconciliation
        # result.
        # Paired with — but DISTINCT from — story 1.7's fixture-coverage
        # gate (the immediate-prior step), which validates COVERAGE
        # (every taxonomy class has ≥1 fixture). 1.7 = COVERAGE; 1.8 =
        # RECONCILIATION-OF-COVERED.
        # Paired with — but DISTINCT from — story 6.8's runtime FR33 gate
        # (lands in Epic 6), which validates the SAME reconciler against
        # reference-project run logs. Both gates use the same reconciler.py
        # component WITHOUT modification (epics.md line 905 + line 2783);
        # their diagnostics are distinct-shape (epics.md line 2790:
        # "Fixture reconciliation failed: ..." vs. "Runtime reconciliation
        # failed: ..."); both gates coexist in CI (epics.md line 906).
        # Ordering rationale: this gate runs LAST among the harness gates
        # because (a) it depends on the same canonical corpus that
        # fixture-coverage (the immediate-prior gate) just certified well-
        # shaped, (b) it depends on the same canonical marker-taxonomy.yaml
        # that enumeration-check certified internally consistent, (c) it
        # depends on the same canonical orchestrator-event.yaml that
        # event-validator certified instance-document-validatable, and
        # (d) by running LAST, this gate's per-fixture diagnostics are
        # interpretable in the context of upstream gates having ALREADY
        # ruled out structural causes — defense-in-depth ordering, NOT
        # redundancy.
        # Operational meaning of a failure: (a) a regression in
        # reconciler.py's matching logic, OR (b) a fixture-side
        # declaration drift (the fixture's expected_marker no longer
        # reflects what the reconciler produces).
        # No positional arguments — the script discovers
        # examples/synthetic-stories/ + schemas/marker-taxonomy.yaml +
        # schemas/orchestrator-event.yaml from disk via find_repo_root.
        run: uv run fr33-fixture-gate
